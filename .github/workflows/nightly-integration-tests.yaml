name: 'Tests: Run nightly monitoring integration tests'

permissions:
  contents: read

on:
  push
#  schedule:
#    - cron: '0 0 * * *'

jobs:
  Nightly-Monitoring-Pipeline:
    uses: Netcracker/qubership-test-pipelines/.github/workflows/monitoring.yaml@feat/nightly_monitoring
    with:
      service_branch: main
      pipeline_branch: 'feat/nightly_monitoring' # this value must match the value after '@' in 'uses'
      repository_name: '${{ github.repository_owner }}/qubership-monitoring-operator'
      kind-layout: 'single-node'
      scope: 'nightly'
    secrets:
      AWS_S3_ACCESS_KEY_ID: ${{secrets.AWS_S3_ACCESS_KEY_ID}}
      AWS_S3_ACCESS_KEY_SECRET: ${{secrets.AWS_S3_ACCESS_KEY_SECRET}}

