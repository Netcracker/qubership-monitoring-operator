name: 'Tests: Run monitoring integration tests'

on:
  push:
    branches:
      - main
    tags:
      - v*
    paths:
      - .github/workflows/integration-tests.yaml
      - .github/expected-vm-cr-statuses.json
      - api/**
      - charts/**
      - cmd/**
      - controllers/**
      - test/robot-tests/**
  pull_request:
    branches:
      - '**'
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - .github/workflows/integration-tests.yaml
      - .github/expected-vm-cr-statuses.json
      - api/**
      - charts/**
      - cmd/**
      - controllers/**
      - test/robot-tests/**
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  Wait-for-images:
    if: |
      (
        github.event_name != 'pull_request' || (
          github.event.pull_request.user.login != 'dependabot[bot]' &&
          github.event.pull_request.user.login != 'renovate[bot]' &&
          github.event.pull_request.head.repo.full_name == github.repository
        )
      )
    runs-on: ubuntu-latest
    outputs:
      conclusion: ${{ steps.wait.outputs.conclusion }}
    steps:
      - name: Wait for build.yaml to complete
        uses: netcracker/qubership-workflow-hub/actions/wait-for-workflow@8c6dbeb901920bae9f40d7d7b646d8d9127e1ce7 # v2.4.0
        id: wait
        with:
          workflow: build.yaml
          token: ${{ secrets.GITHUB_TOKEN }}

  Monitoring-Pipeline:
    needs: [Wait-for-images]
    if: |
      needs.Wait-for-images.outputs.conclusion == 'success' &&
        (
          github.event.pull_request.user.login != 'dependabot[bot]' &&
          github.event.pull_request.user.login != 'renovate[bot]'
        )
    uses: Netcracker/qubership-test-pipelines/.github/workflows/monitoring.yaml@ddc741b38bac5dc4834b8f6827c9f6d16abf0db8 # v1.14.1
    with:
      service_branch: ${{ github.sha }}
      pipeline_branch: 'ddc741b38bac5dc4834b8f6827c9f6d16abf0db8' # v1.14.1 renovate: depName=Netcracker/qubership-test-pipelines
      repository_name: '${{ github.repository_owner }}/qubership-monitoring-operator'
      kind-layout: 'single-node'
