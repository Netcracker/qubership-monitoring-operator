---
name: "Cleanup: Remove old Docker images"

on:
  schedule:
    - cron: "0 0 * * 0" # Runs weekly on Sunday at midnight
  workflow_dispatch:
    inputs:
      threshold-days:
        description: "Number of days to keep container versions"
        required: false
        default: "7"
      included-tags:
        description: "Tags to include for deletion"
        required: false
        default: "*"
      excluded-tags:
        description: "Tags to exclude from deletion"
        required: false
        default: "main,latest,release*,semver"
      dry-run:
        description: "Enable dry-run mode"
        required: false
        default: false
        type: boolean

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: "Summary"
        run: |
          echo "**Event**: ${{ github.event_name }}"
          echo "**Actor**: ${{ github.actor }}"
          echo "**Threshold days**: ${{ github.event.inputs.threshold-days || 7 }}"
          echo "**Included tags**: ${{ github.event.inputs.included-tags || '*' }}"
          echo "**Excluded tags**: ${{ github.event.inputs.excluded-tags || 'main,latest,release*,semver' }}"
          echo "**Dry-run**: ${{ github.event.inputs.dry-run || 'false' }}"

      - name: Run Container Package Cleanup Action
        uses: Netcracker/qubership-workflow-hub/actions/container-package-cleanup@6a2de8d62ac5b6998e30f923613c998c263ea9f2 # v2.2.2
        with:
          threshold-days: ${{ github.event.inputs.threshold-days || 7 }}
          included-tags: ${{ github.event.inputs.included-tags || '*' }}
          excluded-tags: ${{ github.event.inputs.excluded-tags || 'main,latest,release*,semver' }}
          dry-run: ${{ github.event.inputs.dry-run || 'false' }}
        env:
          PACKAGE_TOKEN: ${{ secrets.GH_RWD_PACKAGE_TOKEN }}
