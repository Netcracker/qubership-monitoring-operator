---
name: Monitoring Operator Release
run-name: "Release: Monitoring Operator ${{ inputs.appVersion }} with Helm chart version ${{ inputs.version }}"

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version"
        required: true
      appVersion:
        description: "Application Version"
        required: true
      dry-run:
        type: boolean
        description: "Dry run"
        required: false
        default: true
      path-to-chart:
        description: "Path to chart"
        required: true
        default: "./charts/qubership-monitoring-operator/Chart.yaml"

permissions: {}

jobs:
  check-tag:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check if tag exists
        id: check_tag
        uses: netcracker/qubership-workflow-hub/actions/tag-action@6a2de8d62ac5b6998e30f923613c998c263ea9f2 # v2.2.2
        with:
          ref: ${{ github.ref }}
          check-tag: "true"
          create-tag: "false"
          tag-name: v${{ github.event.inputs.appVersion }}

  load-docker-build-components:
    needs: [ check-tag ]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      component: ${{ steps.load_component.outputs.components }}
      platforms: ${{ steps.load_component.outputs.platforms }}
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Load Docker Configuration
        id: load_component
        run: |
          verify=$(cat "$GITHUB_WORKSPACE/.github/docker-release-config.json" | jq '
          def verify_structure:
          .components as $components
          | .platforms as $platforms
          | ($components | type == "array")
          and (all($components[]; has("name") and has("file") and has("context")))
          and ($platforms | type == "string");
          verify_structure
          | if . then true else false end
          ')
          if [ ${verify} == 'true' ]; then
            echo "✅ $GITHUB_WORKSPACE/.github/docker-release--config.json file is valid"
            components=$(jq -c ".components" "$GITHUB_WORKSPACE/.github/docker-release-config.json")
            platforms=$(jq -c ".platforms" "$GITHUB_WORKSPACE/.github/docker-release-config.json")
          else
            echo "❗ $GITHUB_WORKSPACE/.github/docker-release-config.json file is invalid"
            echo "❗ $GITHUB_WORKSPACE/.github/docker-release-config.json file is invalid" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          echo "components=${components}" >> $GITHUB_OUTPUT
          echo "platforms=${platforms}" >> $GITHUB_OUTPUT

  prepare-chart-and-tag:
    permissions:
      contents: write
    needs: [ check-tag ]
    runs-on: ubuntu-latest
    steps:
      - name: Change Chart Version Action
        uses: netcracker/qubership-workflow-hub/actions/chart-version@6a2de8d62ac5b6998e30f923613c998c263ea9f2 # v2.2.2
        with:
          new-chart-version: ${{ github.event.inputs.version }}
          chart-app-version: ${{ github.event.inputs.appVersion }}
          chart-yaml-path: ${{ github.event.inputs.path-to-chart }}

      - name: Commit and push chart version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ github.event.inputs.version }}
          APP_VERSION: ${{ github.event.inputs.appVersion }}
          CHART_PATH: ${{ github.event.inputs.path-to-chart }}
          REPO: ${{ github.repository }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${REPO}.git"
          git add "$CHART_PATH"
          git diff --staged --quiet && echo "No chart changes to commit" && exit 0
          git commit -m "Update chart version and appVersion to ${VERSION} and ${APP_VERSION}"
          git push origin "HEAD:${REF_NAME}"

      - name: "Create release tag"
        uses: netcracker/qubership-workflow-hub/actions/tag-action@6a2de8d62ac5b6998e30f923613c998c263ea9f2 # v2.2.2
        with:
          ref: ${{ github.ref }}
          check-tag: "false"
          create-tag: "true"
          tag-name: v${{ github.event.inputs.appVersion }}

  docker-build:
    permissions:
      contents: write
      packages: write
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        component: ${{ fromJson(needs.load-docker-build-components.outputs.component) }}
    needs: [ prepare-chart-and-tag, load-docker-build-components ]
    steps:
      - name: "Docker Build"
        id: docker_build
        uses: netcracker/qubership-workflow-hub/actions/docker-action@6a2de8d62ac5b6998e30f923613c998c263ea9f2 # v2.2.2
        with:
          ref: v${{ inputs.appVersion }}
          download-artifact: false
          dry-run: ${{ inputs.dry-run }}
          component: ${{ toJson(matrix.component) }}
          platforms: ${{ needs.load-docker-build-components.outputs.platforms }}
        env:
          GITHUB_TOKEN: ${{ github.token }}

  github-release:
    needs: [docker-build]
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}
          persist-credentials: false
      - name: Run Release Drafter
        uses: netcracker/release-drafter@130c08399304912ffe90e9604e4328f2fdcd7619 # v1.0.1
        with:
          config-name: release-drafter-config.yml
          publish: 'false'
          name: v${{ github.event.inputs.appVersion }}
          tag: v${{ github.event.inputs.appVersion }}
          version: ${{ github.event.inputs.appVersion }}
          latest: 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  upload-assets:
    needs: [github-release]
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Create archives
        run: |
          mkdir -p dist
          tar -czf dist/helm-charts.tar.gz -C . charts
          tar -cf dist/docs.tar -C . docs

      - name: Upload assets to release
        uses: netcracker/qubership-workflow-hub/actions/assets-action@6a2de8d62ac5b6998e30f923613c998c263ea9f2 # v2.2.2
        with:
          tag: v${{ github.event.inputs.appVersion }}
          item-path: ./dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
