apiVersion: integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: kubernetes-namespace-resources
  labels:
    app.kubernetes.io/component: monitoring
spec:
  instanceSelector:
    matchLabels:
      app.kubernetes.io/component: grafana
      app.kubernetes.io/part-of: monitoring
  json: >
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "type": "datasource",
              "uid": "${datasource}"
            },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "target": {
              "limit": 100,
              "matchAny": false,
              "tags": [],
              "type": "dashboard"
            },
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "id": 5,
      "links": [
        {
          "asDropdown": false,
          "icon": "external link",
          "includeVars": false,
          "keepTime": false,
          "tags": [
            "cluster"
          ],
          "type": "dashboards"
        },
        {
          "icon": "external link",
          "tags": [
            "nodes"
          ],
          "type": "dashboards"
        },
        {
          "asDropdown": false,
          "icon": "external link",
          "includeVars": false,
          "keepTime": false,
          "tags": [
            "nodes",
            "pods"
          ],
          "targetBlank": false,
          "title": "",
          "tooltip": "",
          "type": "dashboards",
          "url": ""
        },
        {
          "asDropdown": false,
          "icon": "external link",
          "includeVars": false,
          "keepTime": false,
          "tags": [
            "linux"
          ],
          "targetBlank": false,
          "title": "",
          "tooltip": "",
          "type": "dashboards",
          "url": ""
        }
      ],
      "panels": [
        {
          "collapsed": true,
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 0
          },
          "id": 10,
          "panels": [
            {
              "datasource": {
                "uid": "${datasource}"
              },
              "description": "Shows the total number of pods in the namespace",
              "fieldConfig": {
                "defaults": {
                  "color": {
                    "mode": "thresholds"
                  },
                  "mappings": [],
                  "noValue": "0",
                  "thresholds": {
                    "mode": "absolute",
                    "steps": [
                      {
                        "color": "#cccccc"
                      }
                    ]
                  }
                },
                "overrides": []
              },
              "gridPos": {
                "h": 5,
                "w": 4,
                "x": 0,
                "y": 1
              },
              "id": 100,
              "options": {
                "colorMode": "value",
                "graphMode": "none",
                "justifyMode": "center",
                "orientation": "auto",
                "percentChangeColorMode": "standard",
                "reduceOptions": {
                  "calcs": [
                    "lastNotNull"
                  ],
                  "fields": "",
                  "values": false
                },
                "showPercentChange": false,
                "text": {
                  "titleSize": 16,
                  "valueSize": 90
                },
                "textMode": "value_and_name",
                "wideLayout": true
              },
              "pluginVersion": "11.6.5",
              "targets": [
                {
                  "datasource": {
                    "uid": "${datasource}"
                  },
                  "exemplar": true,
                  "expr": "sum(kube_pod_status_phase{cluster=\"$cluster\", namespace=\"$namespace\"} == 1)",
                  "instant": false,
                  "interval": "",
                  "legendFormat": "Total",
                  "refId": "A"
                }
              ],
              "title": "Pods Count",
              "type": "stat"
            },
            {
              "datasource": {
                "uid": "$datasource"
              },
              "description": "Shows the number of pods in Failed, Pending, and Unknown state in the namespace",
              "fieldConfig": {
                "defaults": {
                  "color": {
                    "mode": "thresholds"
                  },
                  "decimals": 0,
                  "mappings": [],
                  "thresholds": {
                    "mode": "absolute",
                    "steps": [
                      {
                        "color": "green"
                      },
                      {
                        "color": "red",
                        "value": 1
                      }
                    ]
                  },
                  "unit": "short"
                },
                "overrides": [
                  {
                    "matcher": {
                      "id": "byName",
                      "options": "Pending"
                    },
                    "properties": [
                      {
                        "id": "thresholds",
                        "value": {
                          "mode": "absolute",
                          "steps": [
                            {
                              "color": "green"
                            },
                            {
                              "color": "yellow",
                              "value": 1
                            }
                          ]
                        }
                      }
                    ]
                  },
                  {
                    "matcher": {
                      "id": "byName",
                      "options": "Unknown"
                    },
                    "properties": [
                      {
                        "id": "thresholds",
                        "value": {
                          "mode": "absolute",
                          "steps": [
                            {
                              "color": "green"
                            },
                            {
                              "color": "purple",
                              "value": 1
                            }
                          ]
                        }
                      }
                    ]
                  },
                  {
                    "matcher": {
                      "id": "byName",
                      "options": "Succeeded"
                    },
                    "properties": [
                      {
                        "id": "color",
                        "value": {
                          "fixedColor": "green",
                          "mode": "fixed"
                        }
                      }
                    ]
                  }
                ]
              },
              "gridPos": {
                "h": 5,
                "w": 8,
                "x": 4,
                "y": 1
              },
              "id": 30,
              "maxDataPoints": 100,
              "options": {
                "colorMode": "value",
                "graphMode": "none",
                "justifyMode": "center",
                "orientation": "auto",
                "percentChangeColorMode": "standard",
                "reduceOptions": {
                  "calcs": [
                    "last"
                  ],
                  "fields": "",
                  "values": false
                },
                "showPercentChange": false,
                "text": {
                  "titleSize": 16,
                  "valueSize": 90
                },
                "textMode": "auto",
                "wideLayout": true
              },
              "pluginVersion": "11.6.5",
              "targets": [
                {
                  "datasource": {
                    "uid": "$datasource"
                  },
                  "exemplar": true,
                  "expr": "scalar(sum(kube_pod_status_phase{cluster=\"$cluster\", namespace=~\"$namespace\", phase=\"Failed\"} == 1 ) or vector(0)) + scalar(sum(kube_pod_status_ready{cluster=\"$cluster\", namespace=\"$namespace\", condition=\"false\"}) or vector(0)) -\nscalar(sum(kube_pod_status_phase{cluster=\"$cluster\", namespace=~\"$namespace\", phase=\"Succeeded\"} == 1) OR vector(0))",
                  "hide": false,
                  "instant": true,
                  "interval": "",
                  "legendFormat": "Failed",
                  "refId": "A"
                },
                {
                  "datasource": {
                    "uid": "$datasource"
                  },
                  "exemplar": true,
                  "expr": "sum(kube_pod_status_phase{cluster=\"$cluster\", namespace=~\"$namespace\", phase=\"Pending\"} == 1) OR vector(0)",
                  "hide": false,
                  "instant": true,
                  "interval": "",
                  "legendFormat": "Pending",
                  "refId": "B"
                },
                {
                  "datasource": {
                    "uid": "$datasource"
                  },
                  "exemplar": true,
                  "expr": "sum(kube_pod_status_phase{cluster=\"$cluster\", namespace=~\"$namespace\", phase=\"Unknown\"} == 1) OR vector(0)",
                  "hide": false,
                  "instant": true,
                  "interval": "",
                  "legendFormat": "Unknown",
                  "refId": "C"
                },
                {
                  "datasource": {
                    "uid": "$datasource"
                  },
                  "exemplar": true,
                  "expr": "sum(kube_pod_status_phase{cluster=\"$cluster\", namespace=~\"$namespace\", phase=\"Succeeded\"} == 1) OR vector(0)",
                  "hide": false,
                  "instant": true,
                  "interval": "",
                  "legendFormat": "Succeeded",
                  "refId": "D"
                }
              ],
              "title": "Not Running Pods Count",
              "transformations": [
                {
                  "id": "seriesToColumns",
                  "options": {}
                },
                {
                  "id": "organize",
                  "options": {
                    "excludeByName": {},
                    "indexByName": {},
                    "renameByName": {
                      "Value 1": "Failed"
                    }
                  }
                }
              ],
              "type": "stat"
            },
            {
              "datasource": {
                "uid": "${datasource}"
              },
              "description": "Shows the total number of containers in the namespace",
              "fieldConfig": {
                "defaults": {
                  "color": {
                    "fixedColor": "#cccccc",
                    "mode": "thresholds"
                  },
                  "mappings": [],
                  "noValue": "0",
                  "thresholds": {
                    "mode": "absolute",
                    "steps": [
                      {
                        "color": "#cccccc"
                      }
                    ]
                  }
                },
                "overrides": []
              },
              "gridPos": {
                "h": 5,
                "w": 4,
                "x": 12,
                "y": 1
              },
              "id": 109,
              "options": {
                "colorMode": "value",
                "graphMode": "none",
                "justifyMode": "center",
                "orientation": "auto",
                "percentChangeColorMode": "standard",
                "reduceOptions": {
                  "calcs": [
                    "lastNotNull"
                  ],
                  "fields": "",
                  "values": false
                },
                "showPercentChange": false,
                "text": {
                  "titleSize": 16,
                  "valueSize": 90
                },
                "textMode": "value_and_name",
                "wideLayout": true
              },
              "pluginVersion": "11.6.5",
              "targets": [
                {
                  "datasource": {
                    "uid": "${datasource}"
                  },
                  "exemplar": true,
                  "expr": "count(kube_pod_container_info{namespace=\"$namespace\"})",
                  "interval": "",
                  "legendFormat": "Total",
                  "refId": "A"
                }
              ],
              "title": "Containers Count",
              "type": "stat"
            },
            {
              "datasource": {
                "uid": "${datasource}"
              },
              "description": "Show the count of containers in Running, Waiting, and Terminated statuses\n\nNote: Terminated not include \"Completed\" status",
              "fieldConfig": {
                "defaults": {
                  "color": {
                    "mode": "thresholds"
                  },
                  "mappings": [],
                  "thresholds": {
                    "mode": "absolute",
                    "steps": [
                      {
                        "color": "green"
                      },
                      {
                        "color": "red",
                        "value": 80
                      }
                    ]
                  }
                },
                "overrides": [
                  {
                    "matcher": {
                      "id": "byName",
                      "options": "Waiting"
                    },
                    "properties": [
                      {
                        "id": "thresholds",
                        "value": {
                          "mode": "absolute",
                          "steps": [
                            {
                              "color": "green"
                            },
                            {
                              "color": "yellow",
                              "value": 1
                            }
                          ]
                        }
                      }
                    ]
                  },
                  {
                    "matcher": {
                      "id": "byName",
                      "options": "Terminated"
                    },
                    "properties": [
                      {
                        "id": "thresholds",
                        "value": {
                          "mode": "absolute",
                          "steps": [
                            {
                              "color": "green"
                            },
                            {
                              "color": "red",
                              "value": 1
                            }
                          ]
                        }
                      }
                    ]
                  }
                ]
              },
              "gridPos": {
                "h": 5,
                "w": 8,
                "x": 16,
                "y": 1
              },
              "id": 58,
              "options": {
                "colorMode": "value",
                "graphMode": "none",
                "justifyMode": "center",
                "orientation": "auto",
                "percentChangeColorMode": "standard",
                "reduceOptions": {
                  "calcs": [
                    "last"
                  ],
                  "fields": "",
                  "values": false
                },
                "showPercentChange": false,
                "text": {
                  "titleSize": 16,
                  "valueSize": 90
                },
                "textMode": "auto",
                "wideLayout": true
              },
              "pluginVersion": "11.6.5",
              "targets": [
                {
                  "datasource": {
                    "uid": "${datasource}"
                  },
                  "exemplar": true,
                  "expr": "sum(kube_pod_container_status_running{cluster=~\"$cluster\", namespace=\"$namespace\"} == 1) OR vector(0)",
                  "hide": false,
                  "instant": true,
                  "interval": "",
                  "legendFormat": "Running",
                  "refId": "C"
                },
                {
                  "datasource": {
                    "uid": "${datasource}"
                  },
                  "exemplar": true,
                  "expr": "sum(kube_pod_container_status_waiting{cluster=~\"$cluster\", namespace=\"$namespace\"} == 1) OR vector(0)",
                  "instant": true,
                  "interval": "",
                  "legendFormat": "Waiting",
                  "refId": "A"
                },
                {
                  "datasource": {
                    "uid": "${datasource}"
                  },
                  "exemplar": true,
                  "expr": "sum(kube_pod_container_status_terminated_reason{cluster=~\"$cluster\", namespace=\"$namespace\", reason!=\"Completed\"} == 1) OR vector(0)",
                  "hide": false,
                  "instant": true,
                  "interval": "",
                  "legendFormat": "Terminated",
                  "refId": "B"
                },
                {
                  "datasource": {
                    "uid": "${datasource}"
                  },
                  "exemplar": true,
                  "expr": "sum(kube_pod_container_status_terminated_reason{cluster=~\"$cluster\", namespace=\"$namespace\", reason=\"Completed\"} == 1) OR vector(0)",
                  "hide": false,
                  "interval": "",
                  "legendFormat": "Completed",
                  "refId": "D"
                }
              ],
              "title": "Container Status",
              "type": "stat"
            },
            {
              "datasource": {
                "uid": "${datasource}"
              },
              "description": "Show information about the last reason the container was in terminated state",
              "fieldConfig": {
                "defaults": {
                  "color": {
                    "mode": "thresholds"
                  },
                  "custom": {
                    "align": "auto",
                    "cellOptions": {
                      "type": "auto"
                    },
                    "filterable": false,
                    "inspect": false
                  },
                  "mappings": [],
                  "thresholds": {
                    "mode": "absolute",
                    "steps": [
                      {
                        "color": "green"
                      }
                    ]
                  }
                },
                "overrides": [
                  {
                    "matcher": {
                      "id": "byName",
                      "options": "Reason"
                    },
                    "properties": [
                      {
                        "id": "thresholds",
                        "value": {
                          "mode": "absolute",
                          "steps": [
                            {
                              "color": "yellow"
                            }
                          ]
                        }
                      },
                      {
                        "id": "custom.cellOptions",
                        "value": {
                          "mode": "gradient",
                          "type": "color-background"
                        }
                      }
                    ]
                  },
                  {
                    "matcher": {
                      "id": "byName",
                      "options": "Pod"
                    },
                    "properties": [
                      {
                        "id": "links",
                        "value": [
                          {
                            "targetBlank": true,
                            "title": "Drill down to pod",
                            "url": "./d/{% printf `%.40s` (printf `%s-%s` .Release.Namespace (index .DashboardsUIDs `kubernetes-pod-resources`) ) %}/kubernetes-pod-resources?var-datasource=$datasource&var-cluster=$cluster&var-namespace=${__data.fields.namespace}&var-pod=${__data.fields.pod}"
                          }
                        ]
                      }
                    ]
                  }
                ]
              },
              "gridPos": {
                "h": 8,
                "w": 12,
                "x": 0,
                "y": 127
              },
              "id": 64,
              "options": {
                "cellHeight": "sm",
                "footer": {
                  "countRows": false,
                  "fields": "",
                  "reducer": [
                    "sum"
                  ],
                  "show": false
                },
                "showHeader": true,
                "sortBy": []
              },
              "pluginVersion": "11.6.5",
              "targets": [
                {
                  "datasource": {
                    "uid": "${datasource}"
                  },
                  "exemplar": true,
                  "expr": "kube_pod_container_status_last_terminated_reason{cluster=~\"$cluster\", namespace=\"$namespace\", reason!=\"Completed\"} == 1",
                  "format": "table",
                  "instant": true,
                  "interval": "",
                  "legendFormat": "",
                  "refId": "A"
                }
              ],
              "title": "Last Terminated Status",
              "transformations": [
                {
                  "id": "organize",
                  "options": {
                    "excludeByName": {
                      "Time": true,
                      "Value": true,
                      "Value #A": true,
                      "__name__": true,
                      "container": false,
                      "endpoint": true,
                      "container": true,
                      "instance": true,
                      "job": true,
                      "kube_container": true,
                      "kube_namespace": true,
                      "kube_pod": true,
                      "namespace": true,
                      "pod": true,
                      "service": true,
                      "uid": true
                    },
                    "indexByName": {
                      "Time": 4,
                      "Value": 13,
                      "__name__": 6,
                      "container": 2,
                      "endpoint": 7,
                      "container": 5,
                      "namespace": 0,
                      "pod": 1,
                      "instance": 8,
                      "job": 9,
                      "namespace": 10,
                      "pod": 11,
                      "reason": 3,
                      "service": 12
                    },
                    "renameByName": {
                      "Time": "",
                      "container": "Container",
                      "container": "",
                      "namespace": "Namespace",
                      "pod": "Pod",
                      "reason": "Reason"
                    }
                  }
                }
              ],
              "type": "table"
            },
            {
              "datasource": {
                "uid": "${datasource}"
              },
              "description": "Show information about the reason the container is currently in waiting or terminated state",
              "fieldConfig": {
                "defaults": {
                  "color": {
                    "mode": "thresholds"
                  },
                  "custom": {
                    "align": "auto",
                    "cellOptions": {
                      "type": "auto"
                    },
                    "filterable": false,
                    "inspect": false
                  },
                  "mappings": [],
                  "thresholds": {
                    "mode": "absolute",
                    "steps": [
                      {
                        "color": "green"
                      },
                      {
                        "color": "red",
                        "value": 80
                      }
                    ]
                  }
                },
                "overrides": [
                  {
                    "matcher": {
                      "id": "byName",
                      "options": "Reason"
                    },
                    "properties": [
                      {
                        "id": "custom.cellOptions",
                        "value": {
                          "mode": "gradient",
                          "type": "color-background"
                        }
                      },
                      {
                        "id": "thresholds",
                        "value": {
                          "mode": "absolute",
                          "steps": [
                            {
                              "color": "red"
                            }
                          ]
                        }
                      },
                      {
                        "id": "custom.width"
                      }
                    ]
                  },
                  {
                    "matcher": {
                      "id": "byName",
                      "options": "Pod"
                    },
                    "properties": [
                      {
                        "id": "links",
                        "value": [
                          {
                            "targetBlank": true,
                            "title": "Drill down to pod",
                            "url": "./d/{% printf `%.40s` (printf `%s-%s` .Release.Namespace (index .DashboardsUIDs `kubernetes-pod-resources`) ) %}/kubernetes-pod-resources?var-datasource=$datasource&var-cluster=$cluster&var-namespace=${__data.fields.namespace}&var-pod=${__data.fields.pod}"
                          }
                        ]
                      }
                    ]
                  }
                ]
              },
              "gridPos": {
                "h": 8,
                "w": 12,
                "x": 12,
                "y": 127
              },
              "id": 62,
              "options": {
                "cellHeight": "sm",
                "footer": {
                  "countRows": false,
                  "fields": "",
                  "reducer": [
                    "sum"
                  ],
                  "show": false
                },
                "showHeader": true,
                "sortBy": []
              },
              "pluginVersion": "11.6.5",
              "targets": [
                {
                  "datasource": {
                    "uid": "${datasource}"
                  },
                  "exemplar": true,
                  "expr": "kube_pod_container_status_waiting_reason{cluster=~\"$cluster\", namespace=\"$namespace\"} == 1",
                  "format": "table",
                  "hide": false,
                  "instant": true,
                  "interval": "",
                  "legendFormat": "123",
                  "refId": "A"
                },
                {
                  "datasource": {
                    "uid": "${datasource}"
                  },
                  "exemplar": true,
                  "expr": "kube_pod_container_status_terminated_reason{cluster=~\"$cluster\", namespace=\"$namespace\", reason!=\"Completed\"} == 1",
                  "format": "table",
                  "hide": false,
                  "instant": true,
                  "interval": "",
                  "legendFormat": "asd",
                  "refId": "B"
                },
                {
                  "datasource": {
                    "uid": "${datasource}"
                  },
                  "exemplar": true,
                  "expr": "label_replace(kube_pod_status_phase{cluster=\"$cluster\", namespace=\"$namespace\", phase=\"Pending\"}, \"reason\", \"$1\", \"phase\", \"(.*)\") == 1",
                  "format": "table",
                  "hide": false,
                  "instant": true,
                  "interval": "",
                  "legendFormat": "",
                  "refId": "C"
                }
              ],
              "title": "Not Healthy Pods",
              "transformations": [
                {
                  "id": "merge",
                  "options": {}
                },
                {
                  "id": "organize",
                  "options": {
                    "excludeByName": {
                      "Time": true,
                      "Value": true,
                      "Value #A": true,
                      "Value #B": true,
                      "Value #C": true,
                      "__name__": true,
                      "container": false,
                      "endpoint": true,
                      "container": true,
                      "instance": true,
                      "job": true,
                      "kube_container": true,
                      "kube_namespace": true,
                      "kube_pod": true,
                      "namespace": true,
                      "phase": true,
                      "pod": true,
                      "service": true,
                      "uid": true
                    },
                    "indexByName": {
                      "Time": 4,
                      "Value #B": 13,
                      "__name__": 5,
                      "container": 2,
                      "endpoint": 6,
                      "container": 12,
                      "namespace": 0,
                      "pod": 1,
                      "instance": 7,
                      "job": 8,
                      "namespace": 9,
                      "pod": 10,
                      "reason": 3,
                      "service": 11
                    },
                    "renameByName": {
                      "container": "Container",
                      "container": "",
                      "namespace": "Namespace",
                      "pod": "Pod",
                      "reason": "Reason"
                    }
                  }
                }
              ],
              "type": "table"
            },
            {
              "datasource": {
                "uid": "$datasource"
              },
              "description": "Shows a general summary of CPU resources",
              "fieldConfig": {
                "defaults": {
                  "color": {
                    "mode": "palette-classic"
                  },
                  "custom": {
                    "axisBorderShow": false,
                    "axisCenteredZero": false,
                    "axisColorMode": "text",
                    "axisLabel": "Cores",
                    "axisPlacement": "auto",
                    "barAlignment": 0,
                    "barWidthFactor": 0.6,
                    "drawStyle": "line",
                    "fillOpacity": 10,
                    "gradientMode": "none",
                    "hideFrom": {
                      "legend": false,
                      "tooltip": false,
                      "viz": false
                    },
                    "insertNulls": false,
                    "lineInterpolation": "linear",
                    "lineWidth": 2,
                    "pointSize": 5,
                    "scaleDistribution": {
                      "type": "linear"
                    },
                    "showPoints": "never",
                    "spanNulls": false,
                    "stacking": {
                      "group": "A",
                      "mode": "normal"
                    },
                    "thresholdsStyle": {
                      "mode": "off"
                    }
                  },
                  "mappings": [],
                  "min": 0,
                  "thresholds": {
                    "mode": "absolute",
                    "steps": [
                      {
                        "color": "green"
                      },
                      {
                        "color": "red",
                        "value": 80
                      }
                    ]
                  },
                  "unit": "short"
                },
                "overrides": [
                  {
                    "matcher": {
                      "id": "byRegexp",
                      "options": "/.*limits.*/"
                    },
                    "properties": [
                      {
