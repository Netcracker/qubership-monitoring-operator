                    },
                    "properties": [
                      {
                        "id": "color",
                        "value": {
                          "fixedColor": "#d683ce",
                          "mode": "fixed"
                        }
                      }
                    ]
                  },
                  {
                    "matcher": {
                      "id": "byName",
                      "options": "softirq"
                    },
                    "properties": [
                      {
                        "id": "color",
                        "value": {
                          "fixedColor": "#E24D42",
                          "mode": "fixed"
                        }
                      }
                    ]
                  },
                  {
                    "matcher": {
                      "id": "byName",
                      "options": "steal"
                    },
                    "properties": [
                      {
                        "id": "color",
                        "value": {
                          "fixedColor": "#FCE2DE",
                          "mode": "fixed"
                        }
                      }
                    ]
                  },
                  {
                    "matcher": {
                      "id": "byName",
                      "options": "system"
                    },
                    "properties": [
                      {
                        "id": "color",
                        "value": {
                          "fixedColor": "#508642",
                          "mode": "fixed"
                        }
                      }
                    ]
                  },
                  {
                    "matcher": {
                      "id": "byName",
                      "options": "user"
                    },
                    "properties": [
                      {
                        "id": "color",
                        "value": {
                          "fixedColor": "#5195CE",
                          "mode": "fixed"
                        }
                      }
                    ]
                  },
                  {
                    "matcher": {
                      "id": "byName",
                      "options": "磁盘花费在I/O操作占比"
                    },
                    "properties": [
                      {
                        "id": "color",
                        "value": {
                          "fixedColor": "#ba43a9",
                          "mode": "fixed"
                        }
                      }
                    ]
                  },
                  {
                    "matcher": {
                      "id": "byName",
                      "options": "Overall CPU Usage"
                    },
                    "properties": [
                      {
                        "id": "custom.fillOpacity",
                        "value": 10
                      },
                      {
                        "id": "custom.lineWidth",
                        "value": 1
                      },
                      {
                        "id": "unit",
                        "value": "percent"
                      },
                      {
                        "id": "decimals",
                        "value": 0
                      },
                      {
                        "id": "min",
                        "value": 1
                      },
                      {
                        "id": "max",
                        "value": 100
                      },
                      {
                        "id": "custom.axisPlacement",
                        "value": "right"
                      },
                      {
                        "id": "custom.axisLabel",
                        "value": "Overall average used%"
                      }
                    ]
                  },
                  {
                    "matcher": {
                      "id": "byName",
                      "options": "CPU Cores"
                    },
                    "properties": [
                      {
                        "id": "color",
                        "value": {
                          "fixedColor": "#C4162A",
                          "mode": "fixed"
                        }
                      }
                    ]
                  },
                  {
                    "matcher": {
                      "id": "byValue",
                      "options": {
                        "op": "gte",
                        "reducer": "allIsZero",
                        "value": 0
                      }
                    },
                    "properties": [
                      {
                        "id": "custom.hideFrom",
                        "value": {
                          "legend": true,
                          "tooltip": true,
                          "viz": false
                        }
                      }
                    ]
                  },
                  {
                    "matcher": {
                      "id": "byValue",
                      "options": {
                        "op": "gte",
                        "reducer": "allIsNull",
                        "value": 0
                      }
                    },
                    "properties": [
                      {
                        "id": "custom.hideFrom",
                        "value": {
                          "legend": true,
                          "tooltip": true,
                          "viz": false
                        }
                      }
                    ]
                  }
                ]
              },
              "gridPos": {
                "h": 8,
                "w": 8,
                "x": 0,
                "y": 96
              },
              "id": 191,
              "options": {
                "legend": {
                  "calcs": [
                    "lastNotNull"
                  ],
                  "displayMode": "table",
                  "placement": "bottom",
                  "showLegend": true
                },
                "tooltip": {
                  "hideZeros": false,
                  "mode": "multi",
                  "sort": "desc"
                }
              },
              "pluginVersion": "11.6.5",
              "targets": [
                {
                  "datasource": {
                    "uid": "$datasource"
                  },
                  "expr": "count(node_cpu_seconds_total{cluster=\"$cluster\",job=\"node-exporter\", mode='system'} *on(node) group_left(label_$node_label) kube_node_labels{label_$node_label=~\"$node_label_value\"}) ",
                  "format": "time_series",
                  "hide": false,
                  "interval": "",
                  "intervalFactor": 1,
                  "legendFormat": "CPU Cores",
                  "refId": "B",
                  "step": 240
                },
                {
                  "datasource": {
                    "uid": "$datasource"
                  },
                  "expr": "avg(1 - avg(irate(node_cpu_seconds_total{cluster=\"$cluster\",job=\"node-exporter\",mode=\"idle\"}[$__range]) *on(node) group_left(label_$node_label) kube_node_labels{label_$node_label=~\"$node_label_value\"}) by (instance)) * 100",
                  "format": "time_series",
                  "hide": false,
                  "interval": "",
