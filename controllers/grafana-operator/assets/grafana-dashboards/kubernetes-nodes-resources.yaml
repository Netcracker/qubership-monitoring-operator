apiVersion: integreatly.org/v1alpha1
kind: GrafanaDashboard
metadata:
  name: kubernetes-nodes-resources
  labels:
    app.kubernetes.io/component: monitoring
spec:
  json: >
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "type": "datasource",
              "uid": "${datasource}"
            },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "limit": 100,
            "name": "Annotations & Alerts",
            "showIn": 0,
            "target": {
              "limit": 100,
              "matchAny": false,
              "tags": [],
              "type": "dashboard"
            },
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "id": 15,
      "links": [
        {
          "asDropdown": false,
          "icon": "external link",
          "includeVars": false,
          "tags": [
            "cluster"
          ],
          "targetBlank": false,
          "title": "kubernetes-compute-resources-cluster",
          "type": "dashboards"
        },
        {
          "icon": "external link",
          "tags": [
            "nodes",
            "pods"
          ],
          "type": "dashboards"
        },
        {
          "asDropdown": false,
          "icon": "external link",
          "includeVars": false,
          "keepTime": false,
          "tags": [
            "linux"
          ],
          "targetBlank": false,
          "title": "",
          "tooltip": "",
          "type": "dashboards",
          "url": ""
        }
      ],
      "panels": [
        {
          "collapsed": true,
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 0
          },
          "id": 187,
          "panels": [
            {
              "datasource": {
                "uid": "$datasource"
              },
              "description": "Shows cluster nodes overview: \n  * Node Uptime\n  * Total available CPU and RAM on node\n  * Overall resources usage on node\n  * Can be grouped by node_label\n\n! This panel doesn't work in restricted mode if kube-state-metrics doesn't have permission to scrape the following resources: nodes",
              "fieldConfig": {
                "defaults": {
                  "custom": {
                    "align": "left",
                    "cellOptions": {
                      "type": "auto"
                    },
                    "filterable": false,
                    "inspect": false
                  },
                  "decimals": 2,
                  "mappings": [],
                  "noValue": "-",
                  "thresholds": {
                    "mode": "absolute",
                    "steps": [
                      {
                        "color": "green"
                      },
                      {
                        "color": "red",
                        "value": 80
                      }
                    ]
                  }
                },
                "overrides": [
                  {
                    "matcher": {
                      "id": "byName",
                      "options": "Value #B"
                    },
                    "properties": [
                      {
                        "id": "displayName",
                        "value": "Memory"
                      },
                      {
                        "id": "unit",
                        "value": "bytes"
                      }
                    ]
                  },
                  {
                    "matcher": {
                      "id": "byName",
                      "options": "Value #C"
                    },
                    "properties": [
                      {
                        "id": "displayName",
                        "value": "CPU Cores"
                      },
                      {
                        "id": "decimals",
                        "value": 0
                      }
                    ]
                  },
                  {
                    "matcher": {
                      "id": "byName",
                      "options": "Value #D"
                    },
                    "properties": [
                      {
                        "id": "displayName",
                        "value": "Uptime"
                      },
                      {
                        "id": "unit",
                        "value": "s"
                      }
                    ]
                  },
                  {
                    "matcher": {
                      "id": "byName",
                      "options": "Value #E"
                    },
                    "properties": [
                      {
                        "id": "displayName",
                        "value": "Disk Space Usage"
                      },
                      {
                        "id": "unit",
                        "value": "percent"
                      },
                      {
                        "id": "thresholds",
                        "value": {
                          "mode": "absolute",
                          "steps": [
                            {
                              "color": "green"
                            },
                            {
                              "color": "orange",
                              "value": 70
                            },
                            {
                              "color": "red",
                              "value": 85
                            }
                          ]
                        }
                      },
                      {
                        "id": "custom.cellOptions",
                        "value": {
                          "mode": "gradient",
                          "type": "color-background"
                        }
                      }
                    ]
                  },
                  {
                    "matcher": {
                      "id": "byName",
                      "options": "Value #F"
                    },
                    "properties": [
                      {
                        "id": "displayName",
                        "value": "CPU Usage"
                      },
                      {
                        "id": "unit",
                        "value": "percent"
                      },
                      {
                        "id": "thresholds",
                        "value": {
                          "mode": "absolute",
                          "steps": [
                            {
                              "color": "green"
                            },
                            {
                              "color": "orange",
                              "value": 70
                            },
                            {
                              "color": "red",
                              "value": 85
                            }
                          ]
                        }
                      },
                      {
                        "id": "custom.cellOptions",
                        "value": {
                          "mode": "gradient",
                          "type": "color-background"
                        }
                      }
                    ]
                  },
                  {
                    "matcher": {
                      "id": "byName",
                      "options": "Value #G"
                    },
                    "properties": [
                      {
                        "id": "displayName",
                        "value": "Memory Usage"
                      },
                      {
                        "id": "unit",
                        "value": "percent"
                      },
                      {
                        "id": "thresholds",
                        "value": {
                          "mode": "absolute",
                          "steps": [
                            {
                              "color": "green"
                            },
                            {
                              "color": "orange",
                              "value": 70
                            },
                            {
                              "color": "red",
                              "value": 85
                            }
                          ]
                        }
                      },
                      {
                        "id": "custom.cellOptions",
                        "value": {
                          "mode": "gradient",
                          "type": "color-background"
                        }
                      }
                    ]
                  },
                  {
                    "matcher": {
                      "id": "byName",
                      "options": "Value #H"
                    },
                    "properties": [
                      {
                        "id": "displayName",
                        "value": "Disk Reads / sec"
                      },
                      {
                        "id": "unit",
                        "value": "Bps"
                      },
                      {
                        "id": "thresholds",
                        "value": {
                          "mode": "absolute",
                          "steps": [
                            {
                              "color": "green"
                            },
                            {
                              "color": "orange",
                              "value": 10485760
                            },
                            {
                              "color": "red",
                              "value": 20485760
                            }
                          ]
                        }
                      },
                      {
                        "id": "custom.cellOptions",
                        "value": {
                          "mode": "gradient",
                          "type": "color-background"
                        }
                      }
                    ]
                  },
                  {
                    "matcher": {
                      "id": "byName",
                      "options": "Value #I"
                    },
                    "properties": [
                      {
                        "id": "displayName",
                        "value": "Disk Writes / sec"
                      },
                      {
                        "id": "unit",
                        "value": "Bps"
                      },
                      {
                        "id": "thresholds",
                        "value": {
                          "mode": "absolute",
                          "steps": [
                            {
                              "color": "green"
                            },
                            {
                              "color": "orange",
                              "value": 10485760
                            },
                            {
                              "color": "red",
                              "value": 20485760
                            }
                          ]
                        }
                      },
                      {
                        "id": "custom.cellOptions",
                        "value": {
                          "mode": "gradient",
                          "type": "color-background"
                        }
                      }
                    ]
                  },
                  {
                    "matcher": {
                      "id": "byName",
                      "options": "Value #L"
                    },
                    "properties": [
                      {
                        "id": "displayName",
                        "value": "CPU Load 5m"
                      }
                    ]
                  },
                  {
                    "matcher": {
                      "id": "byName",
                      "options": "Node"
                    },
                    "properties": [
                      {
                        "id": "links",
                        "value": [
                          {
                            "targetBlank": true,
                            "title": "Node Details",
                            "url": "./d/monitoring-node-details/node-details?var-datasource=$datasource&var-cluster=$cluster&var-job=&var-node=&var-hostname=${__data.fields.Node}"
                          }
                        ]
                      }
                    ]
                  }
                ]
              },
              "gridPos": {
                "h": 12,
                "w": 24,
                "x": 0,
                "y": 1
              },
              "id": 185,
              "options": {
                "cellHeight": "sm",
                "footer": {
                  "countRows": false,
                  "fields": "",
                  "reducer": [
                    "sum"
                  ],
                  "show": false
                },
                "showHeader": true,
                "sortBy": [
                  {
                    "desc": false,
                    "displayName": "Node"
                  }
                ]
              },
              "pluginVersion": "11.6.5",
              "targets": [
                {
                  "datasource": {
                    "uid": "$datasource"
                  },
                  "expr": "(node_uname_info{cluster=\"$cluster\"} -0) * on(node) group_left(label_$node_label) kube_node_labels{label_$node_label=~\"$node_label_value\"}",
                  "format": "table",
                  "instant": true,
                  "interval": "",
                  "legendFormat": "Labels",
                  "refId": "A"
                },
                {
                  "datasource": {
                    "uid": "$datasource"
                  },
                  "expr": "sum(time() - node_boot_time_seconds{cluster=\"$cluster\"} * on(node) group_left(label_$node_label) kube_node_labels{label_$node_label=~\"$node_label_value\"}) by (instance) ",
                  "format": "table",
                  "hide": false,
                  "instant": true,
                  "interval": "",
                  "legendFormat": "Uptime",
                  "refId": "D"
                },
                {
                  "datasource": {
                    "uid": "$datasource"
                  },
                  "expr": "(node_memory_MemTotal_bytes{cluster=\"$cluster\"} - 0) * on(node) group_left(label_$node_label) kube_node_labels{label_$node_label=~\"$node_label_value\"}",
                  "format": "table",
                  "hide": false,
                  "instant": true,
                  "interval": "",
                  "legendFormat": "Memory",
                  "refId": "B"
                },
                {
                  "datasource": {
                    "uid": "$datasource"
                  },
                  "expr": "count(node_cpu_seconds_total{mode='system',cluster=\"$cluster\"} * on(node) group_left(label_$node_label) kube_node_labels{label_$node_label=~\"$node_label_value\"}) by (instance)",
                  "format": "table",
                  "hide": false,
                  "instant": true,
                  "interval": "",
                  "legendFormat": "CPU",
                  "refId": "C"
                },
                {
                  "datasource": {
                    "uid": "$datasource"
                  },
                  "expr": "node_load5{cluster=\"$cluster\"} * on(node) group_left(label_$node_label) kube_node_labels{label_$node_label=~\"$node_label_value\"}",
                  "format": "table",
                  "instant": true,
                  "interval": "",
                  "legendFormat": "CPU Last 5m Load",
                  "refId": "L"
                },
                {
                  "datasource": {
                    "uid": "$datasource"
                  },
                  "expr": "(1 - avg(irate(node_cpu_seconds_total{mode=\"idle\",cluster=\"$cluster\"}[$__rate_interval])* on(node) group_left(label_$node_label) kube_node_labels{label_$node_label=~\"$node_label_value\"}) by (instance)) * 100",
                  "format": "table",
                  "hide": false,
                  "instant": true,
                  "interval": "",
                  "legendFormat": "CPU Usage",
                  "refId": "F"
                },
                {
                  "datasource": {
                    "uid": "$datasource"
                  },
                  "expr": "(1 - ((node_memory_MemAvailable_bytes{cluster=\"$cluster\"} / (node_memory_MemTotal_bytes{cluster=\"$cluster\"})* on(node) group_left(label_$node_label) kube_node_labels{label_$node_label=~\"$node_label_value\"}))) * 100",
                  "format": "table",
                  "hide": false,
                  "instant": true,
                  "interval": "",
                  "legendFormat": "Memory Usage",
                  "refId": "G"
                },
                {
                  "datasource": {
                    "uid": "$datasource"
                  },
                  "expr": "max((node_filesystem_size_bytes{fstype=~\"ext.?|xfs\",cluster=\"$cluster\",mountpoint=\"/\"}-node_filesystem_free_bytes{fstype=~\"ext.?|xfs\",cluster=\"$cluster\",mountpoint=\"/\"}) * 100 / (node_filesystem_avail_bytes {fstype=~\"ext.?|xfs\",cluster=\"$cluster\",mountpoint=\"/\"} + (node_filesystem_size_bytes{fstype=~\"ext.?|xfs\",cluster=\"$cluster\",mountpoint=\"/\"} - node_filesystem_free_bytes{fstype=~\"ext.?|xfs\",cluster=\"$cluster\",mountpoint=\"/\"}))* on(node) group_left(label_$node_label) kube_node_labels{label_$node_label=~\"$node_label_value\"}) by (instance)",
                  "format": "table",
                  "hide": false,
                  "instant": true,
                  "interval": "",
                  "legendFormat": "Disk Space Usage",
                  "refId": "E"
                },
                {
                  "datasource": {
                    "uid": "$datasource"
                  },
                  "expr": "max(irate(node_disk_read_bytes_total{cluster=\"$cluster\"}[$__rate_interval])* on(node) group_left(label_$node_label) kube_node_labels{label_$node_label=~\"$node_label_value\"}) by (instance)",
                  "format": "table",
                  "hide": false,
                  "instant": true,
                  "interval": "",
                  "legendFormat": "Disk Reads / sec",
                  "refId": "H"
                },
                {
                  "datasource": {
                    "uid": "$datasource"
                  },
                  "expr": "max((irate(node_disk_written_bytes_total{cluster=\"$cluster\"}[$__rate_interval])* on(node) group_left(label_$node_label) kube_node_labels{label_$node_label=~\"$node_label_value\"})) by (instance)",
                  "format": "table",
                  "hide": false,
                  "instant": true,
                  "interval": "",
                  "legendFormat": "Disk Writes / sec",
                  "refId": "I"
                }
              ],
              "title": "Nodes Overview",
              "transformations": [
                {
                  "id": "merge",
                  "options": {}
                },
                {
                  "id": "filterFieldsByName",
                  "options": {
                    "include": {
                      "names": [
                        "nodename",
                        "Value #D",
                        "Value #B",
                        "Value #C",
                        "Value #L",
                        "Value #F",
                        "Value #G",
                        "Value #E",
                        "Value #H",
                        "Value #I"
                      ]
                    }
                  }
                },
                {
                  "id": "organize",
                  "options": {
                    "excludeByName": {},
                    "indexByName": {},
                    "renameByName": {
                      "nodename": "Node"
                    }
                  }
                }
              ],
              "type": "table"
            },
            {
              "datasource": {
                "uid": "$datasource"
              },
              "description": "Shows overall CPU average load on all nodes and CPU usage against total number of CPU cores\n  * Can be grouped by node_label\n\n! This panel doesn't work in restricted mode if kube-state-metrics doesn't have permission to scrape the following resources: nodes",
              "fieldConfig": {
                "defaults": {
                  "color": {
                    "mode": "palette-classic"
                  },
                  "custom": {
                    "axisBorderShow": false,
                    "axisCenteredZero": false,
                    "axisColorMode": "text",
                    "axisLabel": "Total 5m load",
                    "axisPlacement": "auto",
                    "barAlignment": 0,
                    "barWidthFactor": 0.6,
                    "drawStyle": "line",
                    "fillOpacity": 0,
                    "gradientMode": "none",
                    "hideFrom": {
                      "legend": false,
                      "tooltip": false,
                      "viz": false
                    },
                    "insertNulls": false,
                    "lineInterpolation": "linear",
                    "lineWidth": 2,
                    "pointSize": 5,
                    "scaleDistribution": {
                      "type": "linear"
                    },
                    "showPoints": "never",
                    "spanNulls": false,
                    "stacking": {
                      "group": "A",
