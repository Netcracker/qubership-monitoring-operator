apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
    helm.sh/hook: crd-install
    helm.sh/hook-weight: '-5'
    operator.grafana.com/version: 5.24.0
  name: grafananotificationpolicies.grafana.integreatly.org
spec:
  group: grafana.integreatly.org
  names:
    categories:
    - grafana-operator
    kind: GrafanaNotificationPolicy
    listKind: GrafanaNotificationPolicyList
    plural: grafananotificationpolicies
    singular: grafananotificationpolicy
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - format: date-time
      jsonPath: .status.lastResync
      name: Last resync
      type: date
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1beta1
    schema:
      openAPIV3Schema:
        properties:
          apiVersion:
            type: string
          kind:
            type: string
          metadata:
            type: object
          spec:
            properties:
              allowCrossNamespaceImport:
                default: false
                type: boolean
              editable:
                type: boolean
                x-kubernetes-validations:
                - message: Value is immutable
                  rule: self == oldSelf
              instanceSelector:
                properties:
                  matchExpressions:
                    items:
                      properties:
                        key:
                          type: string
                        operator:
                          type: string
                        values:
                          items:
                            type: string
                          type: array
                          x-kubernetes-list-type: atomic
                      required:
                      - key
                      - operator
                      type: object
                    type: array
                    x-kubernetes-list-type: atomic
                  matchLabels:
                    additionalProperties:
                      type: string
                    type: object
                type: object
                x-kubernetes-map-type: atomic
                x-kubernetes-validations:
                - message: spec.instanceSelector is immutable
                  rule: self == oldSelf
              resyncPeriod:
                pattern: ^([0-9]+(\.[0-9]+)?(ns|us|µs|ms|s|m|h))+$
                type: string
              route:
                properties:
                  active_time_intervals:
                    items:
                      type: string
                    type: array
                  continue:
                    type: boolean
                  group_by:
                    items:
                      type: string
                    type: array
                  group_interval:
                    type: string
                  group_wait:
                    type: string
                  match_re:
                    additionalProperties:
                      type: string
                    type: object
                  matchers:
                    items:
                      properties:
                        isEqual:
                          type: boolean
                        isRegex:
                          type: boolean
                        name:
                          type: string
                        value:
                          type: string
                      required:
                      - isRegex
                      - value
                      type: object
                    type: array
                  mute_time_intervals:
                    items:
                      type: string
                    type: array
                  object_matchers:
                    items:
                      items:
                        type: string
                      type: array
                    type: array
                  provenance:
                    type: string
                  receiver:
                    minLength: 1
                    type: string
                  repeat_interval:
                    type: string
                  routeSelector:
                    properties:
                      matchExpressions:
                        items:
                          properties:
                            key:
                              type: string
                            operator:
                              type: string
                            values:
                              items:
                                type: string
                              type: array
                              x-kubernetes-list-type: atomic
                          required:
                          - key
                          - operator
                          type: object
                        type: array
                        x-kubernetes-list-type: atomic
                      matchLabels:
                        additionalProperties:
                          type: string
                        type: object
                    type: object
                    x-kubernetes-map-type: atomic
                  routes:
                    x-kubernetes-preserve-unknown-fields: true
                required:
                - receiver
                type: object
                x-kubernetes-validations:
                - message: continue is invalid on the top level route node
                  rule: '!has(self.__continue__)'
                - message: match_re is invalid on the top level route node
                  rule: '!has(self.match_re)'
                - message: matchers is invalid on the top level route node
                  rule: '!has(self.matchers)'
                - message: object_matchers is invalid on the top level route node
                  rule: '!has(self.object_matchers)'
                - message: mute_time_intervals is invalid on the top level route node
                  rule: '!has(self.mute_time_intervals)'
                - message: active_time_intervals is invalid on the top level route node
                  rule: '!has(self.active_time_intervals)'
              suspend:
                type: boolean
            required:
            - instanceSelector
            - route
            type: object
            x-kubernetes-validations:
            - message: spec.editable is immutable
              rule: ((!has(oldSelf.editable) && !has(self.editable)) || (has(oldSelf.editable) && has(self.editable)))
            - message: disabling spec.allowCrossNamespaceImport requires a recreate to ensure desired state
              rule: '!oldSelf.allowCrossNamespaceImport || (oldSelf.allowCrossNamespaceImport && self.allowCrossNamespaceImport)'
          status:
            properties:
              conditions:
                items:
                  properties:
                    lastTransitionTime:
                      format: date-time
                      type: string
                    message:
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              discoveredRoutes:
                items:
                  type: string
                type: array
              lastResync:
                format: date-time
                type: string
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
