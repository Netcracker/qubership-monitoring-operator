nameOverride: ""
fullnameOverride: ""

# Namespace where VictoriaMetrics Operator is installed
# Default: monitoring
# Can be overridden via --set namespace=your-namespace
namespace: "monitoring"

commonLabels: {}
commonAnnotations: {}

# Label that marks shared exporters so other packs (e.g. pack-two) can discover them.
# Change only if you have a different label strategy.
monitoringPackLabel: "one"

# Standard labels that will be applied to ServiceMonitor resources
# Default value: platform.monitoring.type: exporter
# Can be overridden by setting this value
standardLabels: {}

rbac:
  # Enable RBAC resources creation
  install: true
  # Additional labels for RBAC resources
  labels: {}
  # Additional annotations for RBAC resources
  annotations: {}
  vmAgent:
    # Override default service account name (empty = auto-generated)
    serviceAccountName: ""
    # Override default cluster role name (empty = auto-generated)
    clusterRoleName: ""
    # Override default cluster role binding name (empty = auto-generated)
    clusterRoleBindingName: ""
    # Override default role name (empty = auto-generated)
    roleName: ""
    # Override default role binding name (empty = auto-generated)
    roleBindingName: ""
    # Override default cluster rules (empty = use defaults from template)
    clusterRules: []
    # Override default role rules (empty = use defaults from template)
    roleRules: []
  vmAlert:
    # Override default service account name (empty = auto-generated)
    serviceAccountName: ""
    # Override default cluster role name (empty = auto-generated)
    clusterRoleName: ""
    # Override default cluster role binding name (empty = auto-generated)
    clusterRoleBindingName: ""
    # Override default role name (empty = auto-generated)
    roleName: ""
    # Override default role binding name (empty = auto-generated)
    roleBindingName: ""
    # Override default cluster rules (empty = use defaults from template)
    clusterRules: []
    # Override default role rules (empty = use defaults from template)
    roleRules: []
  vmOperator:
    # Enable/disable ClusterRole/ClusterRoleBinding for victoria-metrics-operator
    install: true
    # ServiceAccount name that runs victoria-metrics-operator
    serviceAccountName: ""
    # Override ClusterRole name (empty = auto-generated)
    clusterRoleName: ""
    # Override ClusterRoleBinding name (empty = auto-generated)
    clusterRoleBindingName: ""
    # Override default cluster rules (empty = use defaults from template)
    clusterRules: []

vmAgent:
  install: true
  name: vmagent
  labels: {}
  annotations: {}
  spec:
    arbitraryFSAccessThroughSMs: {}
    externalLabels:
      cluster: example-cluster
    extraArgs:
      promscrape.streamParse: "true"
    resources:
      limits:
        cpu: "1"
        memory: 2000Mi
      requests:
        cpu: 100m
        memory: 500Mi
    scrapeInterval: 30s
    remoteWrite:
      - url: http://vmsingle-k8s.vmsingle-standalone.svc:8429/api/v1/write

vmAlert:
  install: true
  name: vmalert
  labels: {}
  annotations: {}
  spec:
    datasource:
      url: http://vmsingle-k8s.vmsingle-standalone.svc:8429
    remoteWrite:
      url: http://vmsingle-k8s.vmsingle-standalone.svc:8429/api/v1/write
    evaluationInterval: 30s
    ruleSelector:
      matchLabels:
        monitoring-pack: "one"
    ruleNamespaceSelector: {}

vmRules:
  alerts:
    install: true
    # Optional: override generated VMRule name
    name: ""
    labels: {}
    annotations: {}
    groups:
      - name: pack-one-shared-exporters
        interval: 30s
        rules:
          - alert: PackOneExporterTargetDown
            expr: up{job=~"pack-one-monitoring-pack-one-(cloudeventsexporter|kubestatemetrics|nodeexporter|versionexporter)"} == 0
            for: 5m
            labels:
              severity: warning
              monitoring-pack: "one"
            annotations:
              summary: "Shared exporter target is down"
              description: "Exporter target {{ $labels.job }} / {{ $labels.instance }} has been down for more than 5 minutes."
  recording:
    install: true
    # Optional: override generated VMRule name
    name: ""
    labels: {}
    annotations: {}
    groups:
      - name: pack-one-shared-exporters-recording
        interval: 30s
        rules:
          - record: pack_one:mandatory_exporters:up_total
            expr: sum(up{job=~"pack-one-monitoring-pack-one-(cloudeventsexporter|kubestatemetrics|nodeexporter|versionexporter)"} == 1)
          - record: pack_one:mandatory_exporters:total
            expr: count(up{job=~"pack-one-monitoring-pack-one-(cloudeventsexporter|kubestatemetrics|nodeexporter|versionexporter)"})
          - record: pack_one:mandatory_exporters:availability_percent
            expr: 100 * sum(up{job=~"pack-one-monitoring-pack-one-(cloudeventsexporter|kubestatemetrics|nodeexporter|versionexporter)"} == 1) / count(up{job=~"pack-one-monitoring-pack-one-(cloudeventsexporter|kubestatemetrics|nodeexporter|versionexporter)"})

vmAuth:
  install: true
  name: vmauth
  labels: {}
  annotations: {}
  spec:
    replicaCount: 1
    selectAllByDefault: false
    port: "8427"
    resources:
      limits:
        cpu: "500m"
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 128Mi
    extraArgs: {}
    extraEnvs: []

vmUser:
  install: true
  name: vmuser
  labels: {}
  annotations: {}
  spec:
    username: admin
    password: admin
    # targetRefs will be auto-generated if not specified
    # targetRefs: []

vmSingle:
  install: false
  name: k8s
  namespace: vmsingle-standalone
  serviceName: vmsingle-k8s
  servicePort: 8429

ingress:
  install: true
  vmAuth:
    host: vmauth.example.com
    ingressClassName: traefik
    servicePort: 8427
    tlsSecretName: ""
    labels: {}
    annotations: {}
  vmAgent:
    host: vmagent.example.com
    ingressClassName: traefik
    servicePort: 8429
    tlsSecretName: ""
    labels: {}
    annotations: {}
  vmSingle:
    host: vmsingle.example.com
    ingressClassName: traefik
    servicePort: 8429
    tlsSecretName: ""
    labels: {}
    annotations: {}
  vmalert:
    host: vmalert.example.com
    ingressClassName: traefik
    servicePort: 8080
    tlsSecretName: ""
    labels: {}
    annotations: {}

serviceMonitors:
  # Namespace where ServiceMonitor objects will be created.
  # Default: pack-one release namespace.
  resourceNamespace: ""
  # Namespace where shared exporters run.
  # Default quickstart value: monitoring.
  targetNamespace: monitoring

  kubeStateMetrics:
    install: true
    interval: 30s
    targetNamespace: ""
    name: ""
    labels: {}
    annotations: {}

  nodeExporter:
    install: true
    interval: 30s
    targetNamespace: ""
    name: ""
    labels: {}
    annotations: {}

  cloudEventsExporter:
    install: true
    interval: 30s
    targetNamespace: ""
    # Override only if the Service uses a non-standard name.
    # By default it is derived as "<targetNamespace>-cloud-events-exporter".
    serviceName: ""
    name: ""
    labels: {}
    annotations: {}

  versionExporter:
    install: true
    interval: 5m
    scrapeTimeout: 30s
    path: /metrics
    scheme: http
    jobLabel: version-exporter
    targetNamespace: ""
    name: ""
    labels: {}
    annotations: {}
