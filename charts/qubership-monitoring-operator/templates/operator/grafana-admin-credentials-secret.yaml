{{- if and .Values.grafana .Values.grafana.install }}
{{/*
  Create the admin credentials secret when disableDefaultAdminSecret=false (default).
  Single source of truth: this secret. Values are taken from:
    - grafana.security.admin_user / grafana.security.admin_password (default),
    - or overridden by grafana.config.security.admin_user / admin_password when specified (backward compat).
  If the chosen value is empty, existing secret is preserved on upgrade or a random value is generated on first install.
  When disableDefaultAdminSecret=true: the user creates the secret; this template does not run.
*/}}
{{- if not .Values.grafana.disableDefaultAdminSecret }}
{{- $grafanaName := "grafana" }}
{{- if .Values.grafana.name }}
{{- $grafanaName = .Values.grafana.name }}
{{- end }}
{{- $secretName := printf "%s-admin-credentials" $grafanaName }}
{{- $existingSecret := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{- $adminUser := .Values.grafana.security.admin_user }}
{{- if and (index .Values.grafana "config") (index .Values.grafana.config "security") }}
  {{- $cu := index .Values.grafana.config.security "admin_user" }}
  {{- if and $cu (ne (toString $cu) "") }}
    {{- $adminUser = $cu }}
  {{- end }}
{{- end }}
{{- if eq $adminUser "" }}
  {{- if and $existingSecret $existingSecret.data (index $existingSecret.data "GF_SECURITY_ADMIN_USER") }}
    {{- $adminUser = index $existingSecret.data "GF_SECURITY_ADMIN_USER" | b64dec }}
  {{- else }}
    {{- $adminUser = randAlphaNum 8 }}
  {{- end }}
{{- end }}
{{- $adminPassword := .Values.grafana.security.admin_password }}
{{- if and (index .Values.grafana "config") (index .Values.grafana.config "security") }}
  {{- $cp := index .Values.grafana.config.security "admin_password" }}
  {{- if and $cp (ne (toString $cp) "") }}
    {{- $adminPassword = $cp }}
  {{- end }}
{{- end }}
{{- if eq $adminPassword "" }}
  {{- if and $existingSecret $existingSecret.data (index $existingSecret.data "GF_SECURITY_ADMIN_PASSWORD") }}
    {{- $adminPassword = index $existingSecret.data "GF_SECURITY_ADMIN_PASSWORD" | b64dec }}
  {{- else }}
    {{- $adminPassword = randAlphaNum 16 }}
  {{- end }}
{{- end }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ $secretName }}
    app.kubernetes.io/instance: {{ template "monitoring.instance" . }}
    app.kubernetes.io/component: grafana
    app.kubernetes.io/part-of: monitoring
    app.kubernetes.io/managed-by: Helm
type: Opaque
stringData:
  GF_SECURITY_ADMIN_USER: {{ $adminUser | quote }}
  GF_SECURITY_ADMIN_PASSWORD: {{ $adminPassword | quote }}
{{- end }}
{{- end }}
