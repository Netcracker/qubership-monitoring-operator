{{- if and .Values.role.install .Values.global.privilegedRights }}
kind: ClusterRoleBinding
apiVersion: {{ template "rbac.apiVersion" . }}
metadata:
  name: {{ template "monitoring.operator.rbac.fullname" . }}
  labels:
    {{- include "common-labels.resourceLabels" (dict "ctx" . "name" (include "monitoring.operator.rbac.fullname" .) "component" "monitoring-operator") | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ .Values.monitoringOperator.serviceAccount.name }}
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name:  {{ template "monitoring.operator.rbac.fullname" . }}
  apiGroup: rbac.authorization.k8s.io
{{- end }}