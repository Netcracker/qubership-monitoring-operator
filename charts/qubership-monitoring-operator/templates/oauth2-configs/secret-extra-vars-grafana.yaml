{{- if .Values.grafana }}
{{- if .Values.grafana.install }}
{{- $grafanaNamespace := .Release.Namespace }}
{{- if .Values.grafana.namespace }}
{{- $grafanaNamespace = .Values.grafana.namespace }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: grafana-extra-vars-secret
  namespace: {{ $grafanaNamespace }}
  labels:
    {{- include "monitoring.labels" (dict "ctx" . "name" "grafana-extra-vars-secret" "component" "grafana") | nindent 4 }}
type: Opaque
stringData:
{{- if .Values.auth}}
{{- if .Values.auth.clientId}}
  GF_AUTH_GENERIC_OAUTH_CLIENT_ID: {{ .Values.auth.clientId }}
{{- end}}
{{- end}}
{{- if .Values.grafana.extraVarsSecret }}
  {{- range $key, $val := .Values.grafana.extraVarsSecret }}
  {{ $key | quote | indent 6}}: {{ $val | quote }}
{{- end}}
{{- end}}
{{- end}}
{{- end}}
