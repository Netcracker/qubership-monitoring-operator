{{- if .Values.integrationTests.install }}
{{- if eq (.Values.integrationTests.statusWriting.enabled | toString) "true" }}
kind: RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: {{ .Values.integrationTests.name }}-write-status
  labels:
    {{- include "common-labels.resourceLabels" (dict "ctx" . "name" (printf "%s-write-status" .Values.integrationTests.name) "component" "platform-monitoring-tests") | nindent 4 }}
subjects:
- kind: ServiceAccount
  name: {{ .Values.integrationTests.name }}
  namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: {{ .Values.integrationTests.name }}-write-status
  apiGroup: rbac.authorization.k8s.io
{{- end }}
{{- end }}
