{{- if .Values.integrationTests.install }}
{{- if eq (.Values.integrationTests.statusWriting.enabled | toString) "true" }}
{{- $writeStatusRole := printf "%s-write-status" .Values.integrationTests.name -}}
kind: RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: {{ $writeStatusRole }}
  labels:
    {{- include "monitoring.labels" (dict "ctx" . "name" $writeStatusRole "component" "platform-monitoring-tests") | nindent 4 }}
subjects:
- kind: ServiceAccount
  name: {{ .Values.integrationTests.name }}
  namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: {{ $writeStatusRole }}
  apiGroup: rbac.authorization.k8s.io
{{- end }}
{{- end }}
