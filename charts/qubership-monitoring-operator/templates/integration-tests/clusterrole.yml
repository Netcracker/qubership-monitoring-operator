{{- if and .Values.integrationTests.install .Values.global.privilegedRights }}
{{- $intClusterRole := include "integrationTests.rbac.fullname" . -}}
kind: ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: {{ $intClusterRole }}
  labels:
    {{- include "monitoring.labels" (dict "ctx" . "name" $intClusterRole "component" "platform-monitoring-tests") | nindent 4 }}
rules:
  - apiGroups:
      - "integreatly.org"
    resources:
      - grafanadashboards
      - grafanadashboards/status
      - grafanas
      - grafanas/status
    verbs:
      - "get"
      - "list"
      - "watch"
      - "update"
      - "patch"
      - "delete"
      - "create"
  - apiGroups:
      - "grafana.integreatly.org"
    resources:
      - grafanadashboards
      - grafanadashboards/status
      - grafanas
      - grafanas/status
    verbs:
      - "get"
      - "list"
      - "watch"
      - "update"
      - "patch"
      - "delete"
      - "create"
  - apiGroups:
      - "custom.metrics.k8s.io"
    resources:
      - "*"
    verbs:
      - "get"
      - "list"
      - "watch"
{{- end }}
