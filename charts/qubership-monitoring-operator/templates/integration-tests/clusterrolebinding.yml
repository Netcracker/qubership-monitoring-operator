{{- if and .Values.integrationTests.install .Values.global.privilegedRights }}
kind: ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: {{ template "integrationTests.rbac.fullname" . }}
  labels:
    {{- include "common-labels.resourceLabels" (dict "ctx" . "name" (include "integrationTests.rbac.fullname" .) "component" "platform-monitoring-tests") | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ .Values.integrationTests.name }}
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: {{ template "integrationTests.rbac.fullname" . }}
  apiGroup: rbac.authorization.k8s.io
{{- end }}
