{{- if eq .Values.publicCloudName "" }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Values.etcdCertsJob.rbac.clusterRoleBindingName }}
  labels:
    app.kubernetes.io/name: {{ .Values.etcdCertsJob.rbac.clusterRoleBindingName }}
    app.kubernetes.io/component: etcd-certs-to-secret
    app.kubernetes.io/part-of: monitoring
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/instance: {{ template "monitoring.instance" . }}
    app.kubernetes.io/version: {{ template "monitoring.operator.version" . }}
subjects:
  - kind: ServiceAccount
    name: {{ .Values.etcdCertsJob.rbac.serviceAccountName }}
    namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Values.etcdCertsJob.rbac.clusterRoleName }}
{{- end }}
