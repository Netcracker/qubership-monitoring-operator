{{- if .Values.install }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.name }}
  annotations:
    prometheus.io/scrape: "true"
  labels:
    {{- include "monitoring.resourceLabels" (dict "ctx" . "name" .Values.name "component" "cert-exporter") | nindent 4 }}
spec:
  ports:
    - name: metrics
      protocol: TCP
      port: {{ .Values.servicePort }}
      targetPort: 8080
  selector:
    app.kubernetes.io/name: {{ .Values.name }}
{{- end }}