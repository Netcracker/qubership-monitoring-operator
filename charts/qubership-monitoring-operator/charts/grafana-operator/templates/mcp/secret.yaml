{{- if and .Values.mcp.install .Values.mcp.serviceAccountToken }}
{{- if .Values.mcp.existingSecret.name }}
{{- fail "grafana.mcp.serviceAccountToken and grafana.mcp.existingSecret.name are mutually exclusive" }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ default (printf "%s-token" (include "grafana.mcp.fullname" .)) .Values.mcp.tokenSecret.name }}
  labels:
    {{- include "monitoring.labels" (dict "ctx" . "name" (include "grafana.mcp.fullname" .)) | nindent 4 }}
type: Opaque
stringData:
  {{ default "token" .Values.mcp.tokenSecret.key }}: {{ .Values.mcp.serviceAccountToken | quote }}
{{- end }}
