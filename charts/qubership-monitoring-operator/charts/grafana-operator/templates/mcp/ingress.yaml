{{- if and .Values.mcp.install .Values.mcp.ingress.install }}
{{- $name := include "grafana.mcp.fullname" . }}
{{- if eq (len .Values.mcp.ingress.hosts) 0 }}
{{- fail "grafana.mcp.ingress.hosts must contain at least one host when Ingress is enabled" }}
{{- end }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $name }}
  labels:
    {{- include "monitoring.labels" (dict "ctx" . "name" $name "component" "mcp-grafana") | nindent 4 }}
    {{- if .Values.mcp.ingress.labels }}
    {{- include "monitoring.extraLabels" (dict "ctx" . "extraLabels" .Values.mcp.ingress.labels) | nindent 4 }}
    {{- end }}
  {{- if .Values.mcp.ingress.annotations }}
  annotations:
    {{- toYaml .Values.mcp.ingress.annotations | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.mcp.ingress.className }}
  ingressClassName: {{ .Values.mcp.ingress.className | quote }}
  {{- end }}
  {{- if .Values.mcp.ingress.tls }}
  tls:
    {{- toYaml .Values.mcp.ingress.tls | nindent 4 }}
  {{- end }}
  rules:
    {{- range .Values.mcp.ingress.hosts }}
    - host: {{ tpl (toString .host) $ | quote }}
      http:
        paths:
          {{- if .paths }}
          {{- range .paths }}
          - path: {{ .path | default "/" | quote }}
            pathType: {{ .pathType | default "Prefix" }}
            backend:
              service:
                name: {{ $name }}
                port:
                  number: {{ $.Values.mcp.service.port }}
          {{- end }}
          {{- else }}
          - path: "/"
            pathType: Prefix
            backend:
              service:
                name: {{ $name }}
                port:
                  number: {{ $.Values.mcp.service.port }}
          {{- end }}
    {{- end }}
{{- end }}
