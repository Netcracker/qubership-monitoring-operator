{{- if .Values.imageRenderer.install }}
{{- $image := include "grafana.imageRenderer.image" . }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.imageRenderer.name }}
  labels:
    {{- include "monitoring.labels" (dict "ctx" . "name" .Values.imageRenderer.name) | nindent 4 }}
    {{- if .Values.imageRenderer.labels }}
    {{- include "monitoring.extraLabels" (dict "ctx" . "extraLabels" .Values.imageRenderer.labels) | nindent 4 }}
    {{- end }}
  {{- if .Values.imageRenderer.annotations }}
  annotations:
    {{- toYaml .Values.imageRenderer.annotations | nindent 4 }}
  {{- end }}
spec:
  ports:
    - name: web
      protocol: TCP
      port: {{ .Values.imageRenderer.port }}
      targetPort: web
  selector:
    app.kubernetes.io/name: {{ .Values.imageRenderer.name }}
  clusterIP: None
  type: ClusterIP
  sessionAffinity: None
{{- end }}
