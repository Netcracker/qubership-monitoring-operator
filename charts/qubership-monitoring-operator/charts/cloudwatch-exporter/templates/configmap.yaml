{{- if .Values.install }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.name }}
  labels:
    {{- include "common-labels.resourceLabels" (dict "ctx" . "name" .Values.name "component" "cloudwatch-exporter") | nindent 4 }}
data:
  config.yml: |
    {{ tpl .Values.config . | nindent 4 }}
{{- end }}