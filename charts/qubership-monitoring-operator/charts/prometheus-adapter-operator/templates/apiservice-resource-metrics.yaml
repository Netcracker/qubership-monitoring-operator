{{- if and .Values.install .Values.global.privilegedRights .Values.enableResourceMetrics .Values.APIService .Values.APIService.resourceMetrics }}
apiVersion: apiregistration.k8s.io/v1
kind: APIService
metadata:
  name: v1beta1.metrics.k8s.io
  labels:
    {{- include "monitoring.resourceLabels" (dict "ctx" . "name" "v1beta1.metrics.k8s.io" "component" "prometheus-adapter" "managedByOperator" "prometheus-adapter-operator") | nindent 4 }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "5"
spec:
  service:
    name: prometheus-adapter
    namespace: {{ .Release.Namespace }}
  group: metrics.k8s.io
  version: v1beta1
  insecureSkipTLSVerify: true
  groupPriorityMinimum: 100
  versionPriority: 100
{{- end }}
