{{- if and (include "vm.mcp.enabled" .) .Values.mcp.httpRoute.install }}
{{- $name := include "vm.mcp.fullname" . }}
{{- $servicePort := default 8080 .Values.mcp.service.port }}
{{- if eq (len .Values.mcp.httpRoute.parentRefs) 0 }}
{{- fail "victoriametrics.mcp.httpRoute.parentRefs must contain at least one Gateway reference when HTTPRoute is enabled" }}
{{- end }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $name }}
  labels:
    {{- include "monitoring.labels" (dict "ctx" . "name" $name "component" "mcp-victoriametrics") | nindent 4 }}
    {{- if .Values.mcp.httpRoute.labels }}
    {{- include "monitoring.extraLabels" (dict "ctx" . "extraLabels" .Values.mcp.httpRoute.labels) | nindent 4 }}
    {{- end }}
  {{- if .Values.mcp.httpRoute.annotations }}
  annotations:
    {{- toYaml .Values.mcp.httpRoute.annotations | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.mcp.httpRoute.hostnames }}
  hostnames:
    {{- range $hostname := .Values.mcp.httpRoute.hostnames }}
    - {{ tpl $hostname $ | quote }}
    {{- end }}
  {{- end }}
  parentRefs:
    {{- toYaml .Values.mcp.httpRoute.parentRefs | nindent 4 }}
  rules:
    {{- if .Values.mcp.httpRoute.rules }}
    {{- range .Values.mcp.httpRoute.rules }}
    - {{- if .matches }}
      matches:
        {{- toYaml .matches | nindent 8 }}
      {{- else }}
      matches:
        - path:
            type: PathPrefix
            value: /
      {{- end }}
      {{- if .filters }}
      filters:
        {{- toYaml .filters | nindent 8 }}
      {{- end }}
      backendRefs:
        - name: {{ $name }}
          port: {{ $servicePort }}
    {{- end }}
    {{- else }}
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ $name }}
          port: {{ $servicePort }}
    {{- end }}
{{- end }}
