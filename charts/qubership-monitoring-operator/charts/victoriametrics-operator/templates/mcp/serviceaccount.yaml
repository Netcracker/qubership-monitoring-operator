{{- if and (include "vm.mcp.enabled" .) .Values.mcp.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ default (include "vm.mcp.fullname" .) .Values.mcp.serviceAccount.name }}
  labels:
    {{- include "monitoring.labels" (dict "ctx" . "name" (include "vm.mcp.fullname" .)) | nindent 4 }}
    {{- if .Values.mcp.serviceAccount.labels }}
    {{- include "monitoring.extraLabels" (dict "ctx" . "extraLabels" .Values.mcp.serviceAccount.labels) | nindent 4 }}
    {{- end }}
  {{- if .Values.mcp.serviceAccount.annotations }}
  annotations:
    {{- toYaml .Values.mcp.serviceAccount.annotations | nindent 4 }}
  {{- end }}
automountServiceAccountToken: false
{{- end }}
