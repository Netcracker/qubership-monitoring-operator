{{- if and .Values.cleanup.deleteCRs .Values.global.privilegedRights -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "vm.cleanup.rbac.fullname" . }}
  labels:
    {{- include "common-labels.resourceLabels" (dict "ctx" . "name" (include "vm.cleanup.rbac.fullname" .) "component" "victoriametrics") | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-delete
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded,hook-failed
rules:
  - apiGroups:
      - operator.victoriametrics.com
    resources:
      - vmauths
      - vmusers
      - vmagents
      - vmalerts
      - vmsingles
      - vmalertmanagers
      - vmclusters
    verbs:
      - get
      - list
      - watch
      - delete
  - apiGroups:
      - apps
    resources:
      - deployments
      - deployments/scale
    verbs:
      - get
      - list
      - watch
      - patch
      - update
{{- end -}}
