apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: json-exporter-self-service-monitor
  labels:
    {{- include "common-labels.resourceLabels" (dict "ctx" . "name" "json-exporter-self-service-monitor" "component" "monitoring" "processedByOperator" "prometheus-operator") | nindent 4 }}
spec:
  endpoints:
    - interval: {{ .Values.serviceMonitor.interval | default .Values.serviceMonitor.defaults.interval }}
      scrapeTimeout: {{ .Values.serviceMonitor.scrapeTimeout | default .Values.serviceMonitor.defaults.scrapeTimeout }}
      path: /metrics
      port: {{ .Values.service.name }}
      scheme: {{ .Values.serviceMonitor.scheme }}
  jobLabel: json-exporter-self
  selector:
    matchExpressions:
      - key: app.kubernetes.io/name
        operator: In
        values:
          - {{ .Values.name }}
