{{- if and .Values.global.privilegedRights .Values.rbac.createClusterRoleBinding }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "grafana-operator.fullname" . }}
  labels:
    {{- include "monitoring.labels" (dict "ctx" . "name" (include "grafana-operator.name" .)) | nindent 4 }}
    {{- if .Values.additionalLabels }}
    {{- include "monitoring.extraLabels" (dict "ctx" . "extraLabels" .Values.additionalLabels) | nindent 4 }}
    {{- end }}
subjects:
  - kind: ServiceAccount
    name: {{ include "grafana-operator.serviceAccountName" . }}
    namespace: {{ include "grafana-operator.namespace" . }}
roleRef:
  kind: ClusterRole
  name: {{ include "grafana-operator.fullname" . }}
  apiGroup: rbac.authorization.k8s.io
{{- end }}
