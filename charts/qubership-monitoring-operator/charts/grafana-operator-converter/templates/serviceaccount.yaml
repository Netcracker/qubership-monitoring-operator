{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "grafana-operator-converter.serviceAccountName" . }}
  namespace: {{ include "grafana-operator-converter.namespace" . }}
  labels:
    {{- include "monitoring.labels" (dict "ctx" . "name" (include "grafana-operator-converter.name" .) "component" (include "grafana-operator-converter.name" .)) | nindent 4 }}
    {{- if .Values.additionalLabels }}
    {{- include "monitoring.extraLabels" (dict "ctx" . "extraLabels" .Values.additionalLabels) | nindent 4 }}
    {{- end }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: true
{{- end }}
