{{- if and .Values.install .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.serviceAccount.name }}
  labels:
    {{- include "common-labels.resourceLabels" (dict "ctx" . "name" .Values.serviceAccount.name "component" "network-latency-exporter") | nindent 4 }}
{{- end -}}