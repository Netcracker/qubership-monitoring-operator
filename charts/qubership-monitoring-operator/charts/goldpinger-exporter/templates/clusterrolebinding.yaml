{{- if and .Values.install .Values.rbac.create .Values.rbac.clusterscoped }}
kind: ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: {{ .Values.name }}-clusterrolebinding
  labels:
    {{- include "common-labels.resourceLabels" (dict "ctx" . "name" (printf "%s-clusterrolebinding" .Values.name) "component" "goldpinger-exporter") | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "goldpinger.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: {{ .Values.name }}-clusterrole
  apiGroup: rbac.authorization.k8s.io
{{- end }}
