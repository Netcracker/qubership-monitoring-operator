{{- if .Values.install }}
{{- $image := include "goldpinger.image" . }}
{{- $instance := printf "%s-%s" .Values.name .Release.Namespace | trunc 63 | trimSuffix "-" }}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ .Values.name }}
  labels:
    {{- include "monitoring.resourceLabels" (dict "ctx" . "name" .Values.name "component" "goldpinger-exporter") | nindent 4 }}
    app.kubernetes.io/instance: {{ $instance }}
    app.kubernetes.io/version: {{ splitList ":" $image | last | quote }}
    app.kubernetes.io/technology: go
spec:
  {{- with .Values.updateStrategy }}
  updateStrategy:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Values.name | quote }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{ toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "monitoring.resourceLabels" (dict "ctx" . "name" .Values.name "component" "goldpinger-exporter") | nindent 8 }}
        app.kubernetes.io/instance: {{ $instance }}
        app.kubernetes.io/version: {{ splitList ":" $image | last | quote }}
        app.kubernetes.io/technology: go
      {{- with .Values.podLabels }}
      {{ toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- if .Values.priorityClassName }}
      priorityClassName: {{ .Values.priorityClassName }}
      {{- end }}
      serviceAccountName: {{ include "goldpinger.serviceAccountName" . }}
      {{- if .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- range .Values.image.pullSecrets }}
        - name: {{ . }}
        {{- end }}
      {{- end }}
      containers:
        - name: goldpinger-daemon
          image: {{ template "goldpinger.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          volumeMounts:
            - name: zap
              mountPath: /config
          env:
            - name: HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: HOST
              value: "0.0.0.0"
            - name: PORT
              value: "{{ .Values.goldpinger.port }}"
            - name: LABEL_SELECTOR
              value: "app.kubernetes.io/name={{ include "goldpinger.name" . }}"
            {{- if .Values.extraEnv -}}
            {{ toYaml .Values.extraEnv | nindent 12 }}
            {{- end }}
          {{- with .Values.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.goldpinger.port }}
              protocol: TCP
              {{- range $k := .Values.extraEnv }}
              {{- if and (eq $k.name "USE_HOST_IP") (eq $k.value "true") }}
              hostPort: {{ $.Values.goldpinger.port }}
              {{- end }}
              {{- end }}
          livenessProbe:
            httpGet:
              path: /
              port: http
          readinessProbe:
            httpGet:
              path: /
              port: http
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: zap
          configMap:
            name: {{ .Values.name }}-zap
      {{- range $k := .Values.extraEnv }}
      {{- if and (eq $k.name "USE_HOST_IP") (eq $k.value "true") }}
      hostNetwork: true
      {{- end }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
