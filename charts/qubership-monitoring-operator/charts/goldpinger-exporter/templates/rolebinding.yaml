{{- if and .Values.install (or .Values.podSecurityPolicy.enabled (not .Values.rbac.clusterscoped)) }}
kind: RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: {{ .Values.name }}
  labels:
    {{- include "monitoring.labels" . | nindent 4 }}
roleRef:
  kind: Role
  name: {{ .Values.name }}
  apiGroup: rbac.authorization.k8s.io
subjects:
  - kind: ServiceAccount
    name: {{ include "goldpinger.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
