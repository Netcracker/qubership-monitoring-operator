{{- if and .Values.install .Values.installConsole }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: console
  labels:
    app.kubernetes.io/component: monitoring
    app.kubernetes.io/part-of: monitoring
spec:
  endpoints:
  - bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
    interval: 30s
    path: /metrics
    port: https
    scheme: https
    tlsConfig:
      insecureSkipVerify: true
  jobLabel: component
  selector:
    matchLabels:
      app: console
  namespaceSelector:
    matchNames:
    - openshift-console
{{- end }}
