{{- if and .Values.install .Values.installOpenshiftOauthApiserver }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: openshift-oauth-apiserver
  labels:
    app.kubernetes.io/component: monitoring
    app.kubernetes.io/part-of: monitoring
spec:
  endpoints:
  - bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
    interval: 30s
    metricRelabelings:
    - action: drop
      regex: etcd_(debugging|disk|server).*
      sourceLabels:
      - __name__
    - action: drop
      regex: apiserver_admission_controller_admission_latencies_seconds_.*
      sourceLabels:
      - __name__
    - action: drop
      regex: apiserver_admission_step_admission_latencies_seconds_.*
      sourceLabels:
      - __name__
    - action: drop
      regex: apiserver_request_duration_seconds_bucket;(0.15|0.25|0.3|0.35|0.4|0.45|0.6|0.7|0.8|0.9|1.25|1.5|1.75|2.5|3|3.5|4.5|6|7|8|9|15|25|30|50)(\.0)?
      sourceLabels:
      - __name__
      - le
    - action: drop
      regex: apiserver_request_slo_duration_seconds_.*
      sourceLabels:
      - __name__
    port: https
    relabelings:
    - action: replace
      replacement: openshift-oauth-apiserver
      targetLabel: apiserver
    scheme: https
    tlsConfig:
      insecureSkipVerify: true
  namespaceSelector:
    matchNames:
    - openshift-oauth-apiserver
  selector:
    matchLabels:
      app: openshift-oauth-apiserver
{{- end }}
