{{- if .Values.copyOpenshiftCerts }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Values.name }}
  labels:
    app.kubernetes.io/name: {{ .Values.name }}
    app.kubernetes.io/component: openshift-copy-certs
    app.kubernetes.io/part-of: monitoring
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/instance: {{ template "monitoring.instance" . }}
    app.kubernetes.io/version: {{ template "monitoring.operator.version" . }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  {{- if .Values.activeDeadlineSeconds }}
  activeDeadlineSeconds: {{ .Values.activeDeadlineSeconds | default 60 }}
  {{- end }}
  {{- if .Values.ttlSecondsAfterFinished }}
  ttlSecondsAfterFinished: {{ .Values.ttlSecondsAfterFinished | default 60 }}
  {{- end }}
  template:
    metadata:
      labels:
        name: {{ .Values.name }}
        app.kubernetes.io/component: openshift-copy-certs
        app.kubernetes.io/name: {{ .Values.name }}
        app.kubernetes.io/part-of: monitoring
        app.kubernetes.io/instance: {{ template "monitoring.instance" . }}
        app.kubernetes.io/version: {{ template "monitoring.operator.version" . }}
      {{- if .Values.annotations }}
      annotations:
        {{- toYaml .Values.annotations | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
      {{- end }}
      {{- if .Values.tolerations }}
      tolerations:
        {{- toYaml .Values.tolerations | nindent 8 }}
      {{- end }}
      containers:
        - name: openshift-copy-certs
          image: {{ include "image" . }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          args:
            - '--secret=kube-etcd-client-certs'
            - '--log-level={{ .Values.logLevel }}'
          env:
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          resources:
          {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: etc
              mountPath: /etc
              readOnly: true
          securityContext:
            {{ include "securityContext" . }}
      {{- if .Values.priorityClassName }}
      priorityClassName: {{ .Values.priorityClassName }}
      {{- end }}
      restartPolicy: {{ .Values.restartPolicy | default "Never" }}
      serviceAccountName: {{ .Values.rbac.serviceAccountName }}
      automountServiceAccountToken: {{ .Values.automountServiceAccountToken }}
      volumes:
        - name: etc
          hostPath:
            path: /etc
{{- end }}
