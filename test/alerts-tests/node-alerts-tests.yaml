    values: "-1x300"
  - series: 'node_uname_info'
    values: "1x300"
  alert_rule_test:
  - eval_time: 5h
    groupname: NodeExporters
    alertname: HostDiskWillFillIn4Hours
    exp_alerts:
    - exp_labels:
        severity: warning

      exp_annotations:
        summary: "Host disk will fill in 4 hours (instance )"
        description: "Disk will fill in 4 hours at current write rate\n  VALUE = -1\n  LABELS: map[alertgroup:NodeExporters alertname:HostDiskWillFillIn4Hours severity:warning]"

- interval: 1m
  input_series:
  - series: 'node_filesystem_free_bytes'
