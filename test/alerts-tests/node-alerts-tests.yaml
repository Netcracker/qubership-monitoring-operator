rule_files:
- rules.yaml
evaluation_interval: 1m
tests:
- interval: 1m
  input_series:
  - series: 'container_processes'
    values: "9x1440"
  - series: 'node_processes_max_processes'
    values: "10x1440"
  - series: 'node_processes_threads'
    values: "1x1440"
  - series: 'node_uname_info'
    values: "1x1440"
  alert_rule_test:
  - eval_time: 5m
    groupname: NodeProcesses
    alertname: CountPidsAndThreadOutOfLimit
    exp_alerts:
    - exp_labels:
        severity: high

      exp_annotations:
        summary: "Host high PIDs and Threads usage (instance )"
        description: "Sum of node's pids and threads is filling up (< 20 percent left)\n  VALUE = 100\n  LABELS: map[alertgroup:NodeProcesses alertname:CountPidsAndThreadOutOfLimit severity:high]"

- interval: 1m
  input_series:
  - series: 'container_processes'
    values: "1x1440"
  - series: 'node_processes_max_processes'
    values: "100x1440"
  - series: 'node_processes_threads'
    values: "10x1440"
  - series: 'node_uname_info'
    values: "1x1440"
  alert_rule_test:
  - eval_time: 5m
    groupname: NodeProcesses
    alertname: CountPidsAndThreadOutOfLimit
    exp_alerts: []

- interval: 1m
  input_series:
  - series: 'node_memory_MemAvailable_bytes'
    values: "1x1440"
  - series: 'node_memory_MemTotal_bytes'
    values: "100x1440"
  - series: 'node_uname_info'
    values: "1x1440"
  alert_rule_test:
  - eval_time: 15m
    groupname: NodeExporters
    alertname: HostOutOfMemory
    exp_alerts:
    - exp_labels:
        severity: warning

      exp_annotations:
        summary: "Host out of memory (instance )"
        description: "Node memory is filling up (< 10 percent left)\n  VALUE = 1\n  LABELS: map[alertgroup:NodeExporters alertname:HostOutOfMemory severity:warning]"

- interval: 1m
  input_series:
  - series: 'node_memory_MemAvailable_bytes'
    values: "100x1440"
  - series: 'node_memory_MemTotal_bytes'
    values: "100x1440"
  - series: 'node_uname_info'
    values: "1x1440"
  alert_rule_test:
  - eval_time: 15m
    groupname: NodeExporters
    alertname: HostOutOfMemory
    exp_alerts: []

- interval: 1m
  input_series:
  - series: 'node_vmstat_pgmajfault'
    values: "120000+120000x1440"
  - series: 'node_uname_info'
    values: "1x1440"
  alert_rule_test:
  - eval_time: 6m
    groupname: NodeExporters
    alertname: HostMemoryUnderMemoryPressure
    exp_alerts:
    - exp_labels:
        severity: warning

      exp_annotations:
        summary: "Host memory under memory pressure (instance )"
        description: "The node is under heavy memory pressure. High rate of major page faults\n  VALUE = 2000\n  LABELS: map[alertgroup:NodeExporters alertname:HostMemoryUnderMemoryPressure severity:warning]"

- interval: 1m
  input_series:
  - series: 'node_vmstat_pgmajfault'
    values: "0x1440"
  - series: 'node_uname_info'
    values: "1x1440"
  alert_rule_test:
  - eval_time: 6m
    groupname: NodeExporters
    alertname: HostMemoryUnderMemoryPressure
    exp_alerts: []

- interval: 1m
  input_series:
  - series: 'node_network_receive_bytes_total'
    values: "12582912000+12582912000x1440"
  - series: 'node_uname_info'
    values: "1x1440"
  alert_rule_test:
  - eval_time: 6m
    groupname: NodeExporters
    alertname: HostUnusualNetworkThroughputIn
    exp_alerts:
    - exp_labels:
        severity: warning

      exp_annotations:
        summary: "Host unusual network throughput in (instance )"
        description: "Host network interfaces are probably receiving too much data (> 100 MB/s)\n  VALUE = 200\n  LABELS: map[alertgroup:NodeExporters alertname:HostUnusualNetworkThroughputIn severity:warning]"

- interval: 1m
  input_series:
  - series: 'node_network_receive_bytes_total'
