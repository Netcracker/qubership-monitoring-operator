  - series: 'node_filesystem_avail_bytes{mountpoint="/"}'
    values: "5x1440"
  - series: 'node_filesystem_size_bytes{mountpoint="/"}'
    values: "100x1440"
  - series: 'node_uname_info'
    values: "1x1440"
  alert_rule_test:
  - eval_time: 6m
    groupname: NodeExporters
    alertname: HostOutOfDiskSpace
    exp_alerts:
    - exp_labels:
        severity: warning

        mountpoint: /
      exp_annotations:
        summary: "Host out of disk space (instance )"
        description: "Disk is almost full (< 10 percent left)\n  VALUE = 5\n  LABELS: map[alertgroup:NodeExporters alertname:HostOutOfDiskSpace mountpoint:/ severity:warning]"

- interval: 1m
  input_series:
  - series: 'node_filesystem_avail_bytes{mountpoint="/"}'
