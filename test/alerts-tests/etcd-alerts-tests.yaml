rule_files:
- rules.yaml
evaluation_interval: 1m
tests:
- interval: 1m
  input_series:
  - series: 'grpc_server_handling_seconds_bucket{job="etcd", grpc_type="unary", le="0.05"}'
    values: "0+1x1440"
  - series: 'grpc_server_handling_seconds_bucket{job="etcd", grpc_type="unary", le="0.1"}'
    values: "0+2x1440"
  - series: 'grpc_server_handling_seconds_bucket{job="etcd", grpc_type="unary", le="0.15"}'
    values: "0+3x1440"
  - series: 'grpc_server_handling_seconds_bucket{job="etcd", grpc_type="unary", le="0.2"}'
    values: "0+1000x1440"
  - series: 'grpc_server_handling_seconds_bucket{job="etcd", grpc_type="unary", le="+Inf"}'
    values: "0+2000x1440"
  alert_rule_test:
  - eval_time: 30m
    groupname: Etcd
    alertname: EtcdGrpcRequestsSlow
    exp_alerts:
    - exp_labels:
        severity: warning

      exp_annotations:
        summary: "Etcd GRPC requests slow (instance )"
        description: "GRPC requests slowing down, 99th percentil is over 0.15s for 5 minutes\n  VALUE = 0.2\n  LABELS: map[alertgroup:Etcd alertname:EtcdGrpcRequestsSlow severity:warning]"

- interval: 1m
  input_series:
  - series: 'grpc_server_handling_seconds_bucket{job="etcd", grpc_type="unary", le="0.005"}'
    values: "0+1x1440"
  - series: 'grpc_server_handling_seconds_bucket{job="etcd", grpc_type="unary", le="0.01"}'
    values: "0+2x1440"
  - series: 'grpc_server_handling_seconds_bucket{job="etcd", grpc_type="unary", le="0.015"}'
    values: "0+3x1440"
  - series: 'grpc_server_handling_seconds_bucket{job="etcd", grpc_type="unary", le="0.02"}'
    values: "0+1000x1440"
  - series: 'grpc_server_handling_seconds_bucket{job="etcd", grpc_type="unary", le="+Inf"}'
    values: "0+1001x1440"
  alert_rule_test:
  - eval_time: 30m
    groupname: Etcd
    alertname: EtcdGrpcRequestsSlow
    exp_alerts: []

- interval: 1m
  input_series:
  - series: 'etcd_server_has_leader'
    values: "0x1440"
  alert_rule_test:
  - eval_time: 5m
    groupname: Etcd
    alertname: EtcdNoLeader
    exp_alerts:
    - exp_labels:
        severity: critical

      exp_annotations:
        summary: "Etcd no Leader (instance )"
        description: "Etcd cluster have no leader\n  VALUE = 0\n  LABELS: map[__name__:etcd_server_has_leader alertgroup:Etcd alertname:EtcdNoLeader severity:critical]"

- interval: 1m
  input_series:
  - series: 'etcd_server_has_leader'
    values: "1x1440"
  alert_rule_test:
  - eval_time: 5m
    groupname: Etcd
    alertname: EtcdNoLeader
    exp_alerts: []

- interval: 1m
  input_series:
  - series: 'etcd_server_leader_changes_seen_total'
    values: "1+1x120"
  alert_rule_test:
  - eval_time: 2h
    groupname: Etcd
    alertname: EtcdHighNumberOfLeaderChanges
    exp_alerts:
    - exp_labels:
        severity: warning

      exp_annotations:
        summary: "Etcd high number of leader changes (instance )"
        description: "Etcd leader changed more than 3 times during last hour\n  VALUE = 60\n  LABELS: map[alertgroup:Etcd alertname:EtcdHighNumberOfLeaderChanges severity:warning]"

- interval: 1m
  input_series:
  - series: 'etcd_server_leader_changes_seen_total'
    values: "0x120"
  alert_rule_test:
  - eval_time: 2h
    groupname: Etcd
    alertname: EtcdHighNumberOfLeaderChanges
    exp_alerts: []

- interval: 1m
  input_series:
  - series: 'etcd_server_proposals_failed_total'
    values: "1+1x120"
  alert_rule_test:
  - eval_time: 2h
    groupname: Etcd
    alertname: EtcdHighNumberOfFailedProposals
    exp_alerts:
    - exp_labels:
        severity: warning

      exp_annotations:
        summary: "Etcd high number of failed proposals (instance )"
        description: "Etcd server got more than 5 failed proposals past hour\n  VALUE = 60\n  LABELS: map[alertgroup:Etcd alertname:EtcdHighNumberOfFailedProposals severity:warning]"

- interval: 1m
  input_series:
  - series: 'etcd_server_proposals_failed_total'
    values: "0x120"
  alert_rule_test:
  - eval_time: 2h
    groupname: Etcd
    alertname: EtcdHighNumberOfFailedProposals
    exp_alerts: []

- interval: 1m
  input_series:
  - series: 'etcd_disk_wal_fsync_duration_seconds_bucket{le="0.1"}'
    values: "0+1x1440"
  - series: 'etcd_disk_wal_fsync_duration_seconds_bucket{le="0.3"}'
    values: "0+2x1440"
  - series: 'etcd_disk_wal_fsync_duration_seconds_bucket{le="0.5"}'
    values: "0+3x1440"
  - series: 'etcd_disk_wal_fsync_duration_seconds_bucket{le="1"}'
    values: "0+1000x1440"
  - series: 'etcd_disk_wal_fsync_duration_seconds_bucket{le="+Inf"}'
    values: "0+2000x1440"
  alert_rule_test:
  - eval_time: 30m
    groupname: Etcd
    alertname: EtcdHighFsyncDurations
    exp_alerts:
    - exp_labels:
        severity: warning

      exp_annotations:
        summary: "Etcd high fsync durations (instance )"
        description: "Etcd WAL fsync duration increasing, 99th percentil is over 0.5s for 5 minutes\n  VALUE = 1\n  LABELS: map[alertgroup:Etcd alertname:EtcdHighFsyncDurations severity:warning]"

- interval: 1m
  input_series:
  - series: 'etcd_disk_wal_fsync_duration_seconds_bucket{le="0.01"}'
    values: "0+1x1440"
  - series: 'etcd_disk_wal_fsync_duration_seconds_bucket{le="0.03"}'
    values: "0+2x1440"
  - series: 'etcd_disk_wal_fsync_duration_seconds_bucket{le="0.05"}'
    values: "0+3x1440"
  - series: 'etcd_disk_wal_fsync_duration_seconds_bucket{le="0.1"}'
    values: "0+1000x1440"
  - series: 'etcd_disk_wal_fsync_duration_seconds_bucket{le="+Inf"}'
    values: "0+1001x1440"
  alert_rule_test:
  - eval_time: 30m
    groupname: Etcd
    alertname: EtcdHighFsyncDurations
    exp_alerts: []

- interval: 1m
  input_series:
  - series: 'etcd_disk_backend_commit_duration_seconds_bucket{le="0.1"}'
    values: "0+1x1440"
  - series: 'etcd_disk_backend_commit_duration_seconds_bucket{le="0.3"}'
    values: "0+2x1440"
  - series: 'etcd_disk_backend_commit_duration_seconds_bucket{le="0.5"}'
    values: "0+3x1440"
  - series: 'etcd_disk_backend_commit_duration_seconds_bucket{le="1"}'
    values: "0+1000x1440"
  - series: 'etcd_disk_backend_commit_duration_seconds_bucket{le="+Inf"}'
    values: "0+2000x1440"
  alert_rule_test:
  - eval_time: 30m
    groupname: Etcd
    alertname: EtcdHighCommitDurations
    exp_alerts:
    - exp_labels:
        severity: warning

      exp_annotations:
        summary: "Etcd high commit durations (instance )"
        description: "Etcd commit duration increasing, 99th percentil is over 0.25s for 5 minutes\n  VALUE = 1\n  LABELS: map[alertgroup:Etcd alertname:EtcdHighCommitDurations severity:warning]"

- interval: 1m
  input_series:
  - series: 'etcd_disk_backend_commit_duration_seconds_bucket{le="0.01"}'
    values: "0+1x1440"
  - series: 'etcd_disk_backend_commit_duration_seconds_bucket{le="0.03"}'
    values: "0+2x1440"
  - series: 'etcd_disk_backend_commit_duration_seconds_bucket{le="0.05"}'
    values: "0+3x1440"
  - series: 'etcd_disk_backend_commit_duration_seconds_bucket{le="0.1"}'
    values: "0+1000x1440"
  - series: 'etcd_disk_backend_commit_duration_seconds_bucket{le="+Inf"}'
    values: "0+1001x1440"
  alert_rule_test:
  - eval_time: 30m
    groupname: Etcd
    alertname: EtcdHighCommitDurations
    exp_alerts: []

- interval: 5m
  input_series:
  - series: etcd_server_id {job="etcd", label1="test1"}
    values: "1x1440"
  - series: etcd_server_id {job="etcd", label2="test2"}
    values: "1x1440"
  alert_rule_test:
  - eval_time: 15m
    groupname: Etcd
    alertname: EtcdInsufficientMembers
    exp_alerts:
    - exp_labels:
        severity: critical

      exp_annotations:
        summary: "Etcd insufficient Members (instance )"
        description: "Etcd cluster should have an odd number of members\n  VALUE = 0\n  LABELS: map[alertgroup:Etcd alertname:EtcdInsufficientMembers severity:critical]"

- interval: 5m
  input_series:
  - series: etcd_server_id {job="etcd"}
    values: "1x1440"
  alert_rule_test:
  - eval_time: 15m
    groupname: Etcd
    alertname: EtcdInsufficientMembers
    exp_alerts: []

- interval: 1m
  input_series:
  - series: 'etcd_network_peer_round_trip_time_seconds_bucket{job="etcd", le="1"}'
    values: "0+1x1440"
  - series: 'etcd_network_peer_round_trip_time_seconds_bucket{job="etcd", le="2"}'
    values: "0+2x1440"
  - series: 'etcd_network_peer_round_trip_time_seconds_bucket{job="etcd", le="3"}'
    values: "0+3x1440"
  - series: 'etcd_network_peer_round_trip_time_seconds_bucket{job="etcd", le="5"}'
    values: "0+100x1440"
  - series: 'etcd_network_peer_round_trip_time_seconds_bucket{job="etcd", le="+Inf"}'
    values: "0+1000x1440"
  alert_rule_test:
  - eval_time: 30m
    groupname: Etcd
    alertname: EtcdMemberCommunicationSlow
    exp_alerts:
    - exp_labels:
        severity: warning

        job: etcd
      exp_annotations:
        summary: "Etcd member communication slow (instance )"
        description: "Etcd member communication slowing down, 99th percentil is over 0.15s for 5 minutes\n  VALUE = 5\n  LABELS: map[alertgroup:Etcd alertname:EtcdMemberCommunicationSlow job:etcd severity:warning]"

- interval: 1m
  input_series:
  - series: 'etcd_network_peer_round_trip_time_seconds_bucket{job="etcd", le="0.01"}'
    values: "0+100x1440"
  - series: 'etcd_network_peer_round_trip_time_seconds_bucket{job="etcd", le="0.02"}'
    values: "0+200x1440"
  - series: 'etcd_network_peer_round_trip_time_seconds_bucket{job="etcd", le="0.03"}'
    values: "0+300x1440"
  - series: 'etcd_network_peer_round_trip_time_seconds_bucket{job="etcd", le="0.05"}'
    values: "0+400x1440"
  - series: 'etcd_network_peer_round_trip_time_seconds_bucket{job="etcd", le="+Inf"}'
    values: "0+401x1440"
  alert_rule_test:
  - eval_time: 30m
    groupname: Etcd
    alertname: EtcdMemberCommunicationSlow
    exp_alerts: []


- interval: 1m
  input_series:
  - series: 'grpc_server_handled_total{job="etcd",grpc_code="Error"}'
    values: "400+400x1440"
  - series: 'grpc_server_handled_total{job="etcd"}'
    values: "30000+30000x1440"
  alert_rule_test:
  - eval_time: 15m
    groupname: Etcd
    alertname: EtcdHighNumberOfFailedGrpcRequestsWarning
    exp_alerts:
    - exp_labels:
        severity: warning
      exp_annotations:
        summary: "Etcd high number of failed GRPC requests (instance )"
        description: "More than 1 percent GRPC request failure detected in Etcd for 5 minutes\n  VALUE = 1\n  LABELS: map[alertgroup:Etcd alertname:EtcdHighNumberOfFailedGrpcRequestsWarning severity:warning]"

- interval: 1m
  input_series:
  - series: 'grpc_server_handled_total{job="etcd",grpc_code="Error"}'
    values: "0x1440"
  - series: 'grpc_server_handled_total{job="etcd"}'
    values: "0x1440"
  alert_rule_test:
  - eval_time: 15m
    groupname: Etcd
    alertname: EtcdHighNumberOfFailedGrpcRequestsWarning
    exp_alerts: []


- interval: 1m
  input_series:
  - series: 'grpc_server_handled_total{job="etcd",grpc_code="Error"}'
    values: "1200+1200x1440"
  - series: 'grpc_server_handled_total{job="etcd"}'
    values: "30000+30000x1440"
  alert_rule_test:
  - eval_time: 15m
    groupname: Etcd
    alertname: EtcdHighNumberOfFailedGrpcRequestsCritical
    exp_alerts:
    - exp_labels:
        severity: critical
      exp_annotations:
        summary: "Etcd high number of failed GRPC requests (instance )"
        description: "More than 5 percent GRPC request failure detected in Etcd for 5 minutes\n  VALUE = 1\n  LABELS: map[alertgroup:Etcd alertname:EtcdHighNumberOfFailedGrpcRequestsCritical severity:critical]"

- interval: 1m
  input_series:
  - series: 'grpc_server_handled_total{job="etcd",grpc_code="Error"}'
    values: "0x1440"
  - series: 'grpc_server_handled_total{job="etcd"}'
    values: "0x1440"
  alert_rule_test:
  - eval_time: 15m
    groupname: Etcd
    alertname: EtcdHighNumberOfFailedGrpcRequestsCritical
    exp_alerts: []
