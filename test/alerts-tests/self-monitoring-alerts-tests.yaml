rule_files:
- rules.yaml
evaluation_interval: 1m
tests:
- interval: 1m
  input_series:
  - series: vm_data_size_bytes
    values: "0x1440"
  - series: vm_free_disk_space_bytes
    values: "10x1440"
  alert_rule_test:
  - eval_time: 30m
    groupname: SelfMonitoring
    alertname: DiskRunsOutOfSpace
    exp_alerts: []

- interval: 1m
  input_series:
  - series: vm_data_size_bytes
    values: "0x1440"
  - series: vm_free_disk_space_bytes
    values: "1x1440"
  alert_rule_test:
  - eval_time: 30m
    groupname: SelfMonitoring
    alertname: DiskRunsOutOfSpace
    exp_alerts: []

- interval: 1m
  input_series:
  - series: 'test'
    values: "0x1440"
  alert_rule_test:
  - eval_time: 15m
    groupname: SelfMonitoring
    alertname: PrometheusJobMissing
    exp_alerts:
    - exp_labels:
        severity: warning
      exp_annotations:
        summary: "Prometheus job missing (instance )"
        description: "A Prometheus job has disappeared\n  VALUE = 1\n  LABELS: map[alertgroup:SelfMonitoring alertname:PrometheusJobMissing severity:warning]"

- interval: 1m
  input_series:
  - series: 'up{job="prometheus-pod-monitor"}'
    values: "0x1440"
  alert_rule_test:
  - eval_time: 15m
    groupname: SelfMonitoring
    alertname: PrometheusJobMissing
    exp_alerts: []

- interval: 1m
  input_series:
  - series: 'up'
    values: "0x1440"
  alert_rule_test:
  - eval_time: 15m
    groupname: SelfMonitoring
    alertname: PrometheusTargetMissing
    exp_alerts:
    - exp_labels:
        severity: high
      exp_annotations:
        summary: "Prometheus target missing (instance )"
        description: "A Prometheus target has disappeared. An exporter might be crashed.\n  VALUE = 0\n  LABELS: map[__name__:up alertgroup:SelfMonitoring alertname:PrometheusTargetMissing severity:high]"

- interval: 1m
  input_series:
  - series: 'up'
    values: "1x1440"
  alert_rule_test:
  - eval_time: 15m
    groupname: SelfMonitoring
    alertname: PrometheusTargetMissing
    exp_alerts: []

