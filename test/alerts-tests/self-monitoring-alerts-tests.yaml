    exp_alerts:
    - exp_labels:
        severity: critical
      exp_annotations:
        summary: "Prometheus all targets missing (job )"
        description: "A Prometheus job does not have living target anymore.\n  VALUE = 1\n  LABELS: map[alertgroup:SelfMonitoring alertname:PrometheusAllTargetsMissing severity:critical]"

- interval: 1m
