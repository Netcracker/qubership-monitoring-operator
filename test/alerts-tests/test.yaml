rule_files:
- rules.yaml
evaluation_interval: 1m
tests:
- interval: 1m
  input_series:
  - series: kube_node_status_condition{condition="Ready", status="true"}
    values: "0x1440"
  alert_rule_test:
  - eval_time: 15m
    groupname: KubernetesAlerts
    alertname: KubernetesNodeReady
    exp_alerts:
    - exp_labels:
        severity: critical
        condition: Ready
        status: true

      exp_annotations:
        summary: "Kubernetes Node ready (instance )"
        description: "Node  has been unready for a long time\n  VALUE = 0\n  LABELS: map[__name__:kube_node_status_condition alertgroup:KubernetesAlerts alertname:KubernetesNodeReady condition:Ready severity:critical status:true]"

- interval: 1m
  input_series:
  - series: 'kube_node_status_condition{condition="Ready", status="true"}'
    values: "1x1440"
  alert_rule_test:
  - eval_time: 5m
    groupname: KubernetesAlerts
    alertname: KubernetesNodeReady
    exp_alerts: []

