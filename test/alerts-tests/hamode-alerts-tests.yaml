rule_files:
- rules.yaml
evaluation_interval: 1m
tests:
- interval: 1m
  input_series:
  - series: 'kube_deployment_status_replicas_available'
    values: "1x1440"
  alert_rule_test:
  - eval_time: 5m
    groupname: HAmode
    alertname: NotHAKubernetesDeploymentAvailableReplicas
    exp_alerts:
    - exp_labels:
        severity: warning

      exp_annotations:
        summary: "Not HA mode: Deployment Available Replicas < 2 (instance )"
        description: "Not HA mode: Kubernetes Deployment has less than 2 available replicas\n  VALUE = 1\n  LABELS: map[__name__:kube_deployment_status_replicas_available alertgroup:HAmode alertname:NotHAKubernetesDeploymentAvailableReplicas severity:warning]"

- interval: 1m
  input_series:
  - series: 'kube_deployment_status_replicas_available'
    values: "2x1440"
  alert_rule_test:
  - eval_time: 5m
