rule_files:
- rules.yaml
evaluation_interval: 1m
tests:
- interval: 1m
  input_series:
  - series: 'nginx_ingress_controller_requests{status="400"}'
    values: "130+130x1440"
  - series: 'nginx_ingress_controller_requests'
    values: "1200+1200x1440"
  alert_rule_test:
  - eval_time: 15m
    groupname: NginxIngressAlerts
    alertname: NginxHighHttp4xxErrorRate
    exp_alerts:
    - exp_labels:
        severity: high

      exp_annotations:
        summary: "Nginx high HTTP 4xx error rate (node: , namespace: , ingress: )"
        description: "Too many HTTP requests with status 4xx (> 5 percent)\n  VALUE = 9.774436090225564\n  LABELS = map[alertgroup:NginxIngressAlerts alertname:NginxHighHttp4xxErrorRate severity:high]"

- interval: 1m
  input_series:
  - series: 'nginx_ingress_controller_requests{status="400"}'
    values: "0x1440"
  - series: 'nginx_ingress_controller_requests'
    values: "1200+1200x1440"
  alert_rule_test:
  - eval_time: 15m
    groupname: NginxIngressAlerts
    alertname: NginxHighHttp4xxErrorRate
    exp_alerts: []

- interval: 1m
  input_series:
  - series: 'nginx_ingress_controller_requests{status="500"}'
    values: "130+130x1440"
  - series: 'nginx_ingress_controller_requests'
    values: "1200+1200x1440"
  alert_rule_test:
  - eval_time: 15m
    groupname: NginxIngressAlerts
    alertname: NginxHighHttp5xxErrorRate
    exp_alerts:
    - exp_labels:
        severity: high

      exp_annotations:
        summary: "Nginx high HTTP 5xx error rate (node: , namespace: , ingress: )"
        description: "Too many HTTP requests with status 5xx (> 5 percent)\n  VALUE = 9.774436090225564\n  LABELS = map[alertgroup:NginxIngressAlerts alertname:NginxHighHttp5xxErrorRate severity:high]"

- interval: 1m
  input_series:
  - series: 'nginx_ingress_controller_requests{status="500"}'
    values: "0x1440"
  - series: 'nginx_ingress_controller_requests'
    values: "1200+1200x1440"
  alert_rule_test:
  - eval_time: 15m
    groupname: NginxIngressAlerts
    alertname: NginxHighHttp5xxErrorRate
    exp_alerts: []

- interval: 1m
  input_series:
  - series: 'nginx_ingress_controller_request_duration_seconds_bucket{le="1"}'
    values: "0+1x1440"
  - series: 'nginx_ingress_controller_request_duration_seconds_bucket{le="2"}'
    values: "0+2x1440"
  - series: 'nginx_ingress_controller_request_duration_seconds_bucket{le="3"}'
    values: "0+3x1440"
  - series: 'nginx_ingress_controller_request_duration_seconds_bucket{le="5"}'
    values: "0+100x1440"
  - series: 'nginx_ingress_controller_request_duration_seconds_bucket{le="+Inf"}'
    values: "0+1000x1440"
  alert_rule_test:
  - eval_time: 30m
    groupname: NginxIngressAlerts
    alertname: NginxLatencyHigh
    exp_alerts:
    - exp_labels:
        severity: warning

      exp_annotations:
        summary: "Nginx latency high (node: , host: )"
        description: "Nginx p99 latency is higher than 3 seconds\n  VALUE = 5\n  LABELS = map[alertgroup:NginxIngressAlerts alertname:NginxLatencyHigh severity:warning]"

- interval: 1m
  input_series:
  - series: 'nginx_ingress_controller_request_duration_seconds_bucket{le="0.1"}'
    values: "0+1x1440"
  - series: 'nginx_ingress_controller_request_duration_seconds_bucket{le="0.2"}'
    values: "0+2x1440"
  - series: 'nginx_ingress_controller_request_duration_seconds_bucket{le="0.3"}'
    values: "0+3x1440"
  - series: 'nginx_ingress_controller_request_duration_seconds_bucket{le="0.5"}'
    values: "0+100x1440"
  - series: 'nginx_ingress_controller_request_duration_seconds_bucket{le="+Inf"}'
    values: "0+101x1440"
  alert_rule_test:
  - eval_time: 30m
    groupname: NginxIngressAlerts
    alertname: NginxLatencyHigh
    exp_alerts: []
